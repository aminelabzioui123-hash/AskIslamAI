<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1d9bf0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>اسأل الإسلام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg2:#f7f9fa;--bg3:#eff3f4;
  --txt:#0f1419;--txt2:#536471;--txt3:#8899a6;
  --border:#eff3f4;--accent:#1d9bf0;--accent2:#1a8cd8;
  --like:#f91880;--rt:#00ba7c;--shadow:rgba(0,0,0,0.1);
  --logo-filter:none;
  --nav-h:60px;--sidebar-w:260px;--rside-w:340px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html.dark{
  --bg:#000;--bg2:#16181c;--bg3:#202327;
  --txt:#e7e9ea;--txt2:#71767b;--txt3:#536471;
  --border:#2f3336;--shadow:rgba(255,255,255,0.04);
  --logo-filter:invert(1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;scroll-behavior:smooth;}
body{
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5;
  min-height:100%;min-height:100dvh;
  overscroll-behavior:none;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr var(--rside-w);
  height:100vh;height:100dvh;
}
@media(max-width:1100px){
  .app{grid-template-columns:70px 1fr;}
  .rside{display:none;}
  .nav-label{display:none;}
  .nav-item{justify-content:center;padding:0.75rem;}
  .compose-btn span{display:none;}
  .compose-btn{width:48px;height:48px;min-height:48px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0.5rem auto;}
  .user-card .user-info{display:none;}
  .sidebar{padding:0.5rem 0.4rem;align-items:center;}
  .logo span{display:none;}
  .logo{justify-content:center;padding:0.75rem 0;}
}
@media(max-width:640px){
  .app{grid-template-columns:1fr;height:auto;min-height:100dvh;}
  .sidebar{display:none;}
  .rside{display:none;}
  .feed{height:auto;min-height:100dvh;border:none !important;}
  body{padding-bottom:calc(var(--nav-h) + var(--safe-bottom));}
}
@media(orientation:landscape) and (max-height:500px){
  .mobile-nav{display:none !important;}
  body{padding-bottom:0;}
}

/* ── SIDEBAR ── */
.sidebar{
  border-left:1px solid var(--border);
  padding:0.5rem 0.85rem;
  display:flex;flex-direction:column;gap:0.2rem;
  overflow-y:auto;position:sticky;top:0;
  height:100vh;height:100dvh;
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
}
.logo{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.85rem 0.5rem 1.25rem;
  font-weight:700;font-size:1.05rem;
  cursor:pointer;color:var(--txt);text-decoration:none;
}
.nav-item{
  display:flex;align-items:center;gap:0.85rem;
  padding:0.75rem 0.85rem;border-radius:30px;
  cursor:pointer;font-size:1rem;font-weight:500;
  border:none;background:transparent;color:var(--txt);
  font-family:inherit;transition:background 0.15s,color 0.15s;
  min-height:48px;
}
.nav-item:hover{background:var(--bg3);}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:23px;height:23px;flex-shrink:0;}
.compose-btn{
  margin:0.5rem 0;padding:0.9rem 1.5rem;
  background:var(--accent);color:#fff;border:none;border-radius:30px;
  font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:background 0.15s,transform 0.1s;
  width:100%;min-height:48px;
}
.compose-btn:hover{background:var(--accent2);}
.compose-btn:active{transform:scale(0.97);}
.user-card{
  margin-top:auto;display:flex;align-items:center;gap:0.75rem;
  padding:0.85rem;border-radius:12px;cursor:pointer;
  border:none;background:transparent;color:var(--txt);
  font-family:inherit;transition:background 0.15s;width:100%;min-height:56px;
}
.user-card:hover{background:var(--bg3);}

/* ── DRAWER OVERLAY (mobile sidebar) ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:190;
  backdrop-filter:blur(2px);
}
.drawer-overlay.open{display:block;}
.sidebar.drawer-open{
  position:fixed;top:0;right:0;
  height:100vh;height:100dvh;
  width:min(280px,85vw);
  z-index:200;
  box-shadow:-4px 0 30px rgba(0,0,0,0.25);
  transform:translateX(0) !important;
  border-radius:0 0 0 20px;
}

/* ── AVATAR ── */
.ava{
  border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;flex-shrink:0;overflow:hidden;
}
.ava img{width:100%;height:100%;object-fit:cover;}
.ava-sm{width:36px;height:36px;font-size:0.8rem;}
.ava-md{width:44px;height:44px;font-size:1rem;}
.ava-lg{width:56px;height:56px;font-size:1.2rem;}
.ava-xl{width:80px;height:80px;font-size:1.8rem;border:3px solid var(--bg);}

/* ── FEED ── */
.feed{
  border-right:1px solid var(--border);
  border-left:1px solid var(--border);
  height:100vh;height:100dvh;
  overflow-y:auto;display:flex;flex-direction:column;
  scroll-behavior:smooth;
}
.feed-top{
  position:sticky;top:0;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0.85rem 1rem;z-index:50;
  display:flex;align-items:center;gap:0.75rem;
  min-height:56px;
}
html.dark .feed-top{background:rgba(0,0,0,0.88);}
.feed-top h2{font-size:1.1rem;font-weight:700;flex:1;}

/* hamburger button (mobile) */
.hamburger{
  background:none;border:none;cursor:pointer;
  color:var(--txt);padding:0.45rem;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;transition:background 0.15s;
}
.hamburger:hover{background:var(--bg3);}
@media(max-width:640px){.hamburger{display:flex;}}
.back-btn{
  background:none;border:none;cursor:pointer;color:var(--txt);
  padding:0.35rem;border-radius:50%;display:flex;
  min-width:44px;min-height:44px;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.back-btn:hover{background:var(--bg3);}

/* ── PAGE ── */
.page{display:none;}
.page.active{display:block;}

/* ── COMPOSER ── */
.composer{border-bottom:1px solid var(--border);padding:0.85rem 1rem;display:flex;gap:0.8rem;}
.composer-right{flex:1;display:flex;flex-direction:column;}
.composer textarea{
  background:transparent;border:none;color:var(--txt);
  font-size:1.05rem;font-family:inherit;resize:none;outline:none;
  min-height:60px;width:100%;padding-top:0.5rem;
}
.composer textarea::placeholder{color:var(--txt2);}
.composer-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:0.75rem;border-top:1px solid var(--border);margin-top:0.5rem;
}
.composer-tools{display:flex;gap:0.2rem;flex-wrap:wrap;}
.icon-btn{
  min-width:44px;min-height:44px;border-radius:50%;
  background:transparent;border:none;color:var(--accent);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.icon-btn:hover{background:rgba(29,155,240,0.1);}
.icon-btn svg{width:19px;height:19px;}
.post-btn{
  padding:0.55rem 1.3rem;background:var(--accent);color:#fff;
  border:none;border-radius:20px;font-weight:700;cursor:pointer;
  font-size:0.9rem;font-family:inherit;transition:background 0.15s,transform 0.1s;
  min-height:40px;
}
.post-btn:hover{background:var(--accent2);}
.post-btn:active{transform:scale(0.96);}
.post-btn:disabled{opacity:0.4;cursor:not-allowed;}
.char-count{font-size:0.8rem;color:var(--txt2);}
.char-count.warn{color:#ffa500;}
.char-count.over{color:var(--like);}

/* ── TWEET CARD ── */
.tweet{
  border-bottom:1px solid var(--border);
  padding:1rem;cursor:pointer;
  transition:background 0.15s;
  animation:fadeIn 0.22s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@media(max-width:640px){.tweet{padding:0.85rem 0.9rem;}}
.tweet:hover{background:var(--bg2);}
.tweet-inner{display:flex;gap:0.75rem;}
.tweet-body{flex:1;min-width:0;}
.tweet-head{
  display:flex;align-items:center;gap:0.35rem;
  flex-wrap:wrap;margin-bottom:0.3rem;
  position:relative;
}
.tweet-name{font-weight:700;font-size:0.95rem;cursor:pointer;flex-shrink:0;}
.tweet-name:hover{text-decoration:underline;}
.tweet-handle{color:var(--txt2);font-size:0.82rem;flex-shrink:0;}
.tweet-time{color:var(--txt2);font-size:0.82rem;flex-shrink:0;}
.tweet-edited{color:var(--txt2);font-size:0.75rem;}
.tweet-text{
  font-size:0.97rem;line-height:1.55;
  word-break:break-word;margin-bottom:0.75rem;white-space:pre-wrap;
}
.tweet-text a{color:var(--accent);text-decoration:none;}
.tweet-text a:hover{text-decoration:underline;}
.tweet-img{
  width:100%;border-radius:14px;
  max-height:300px;object-fit:cover;
  margin-bottom:0.75rem;display:block;
}
.tweet-stats{
  display:flex;gap:1.5rem;margin-bottom:0.75rem;
  padding-bottom:0.75rem;border-bottom:1px solid var(--border);
  font-size:0.82rem;color:var(--txt2);
}
.tweet-actions{display:flex;justify-content:space-between;margin-top:0.1rem;}
.tact{
  display:flex;align-items:center;justify-content:center;gap:0.35rem;
  padding:0.5rem 0.65rem;border-radius:20px;cursor:pointer;
  transition:all 0.15s;color:var(--txt2);font-size:0.83rem;
  border:none;background:transparent;font-family:inherit;
  min-height:44px;min-width:44px;flex:1;
}
.tact svg{width:18px;height:18px;}
.tact:hover{background:rgba(29,155,240,0.1);color:var(--accent);}
.tact.like:hover{background:rgba(249,24,128,0.1);color:var(--like);}
.tact.like.on{color:var(--like);}
.tact.like.on svg{fill:var(--like);stroke:var(--like);}
.tact.rt:hover{background:rgba(0,186,124,0.1);color:var(--rt);}
.tact.rt.on{color:var(--rt);}
.tact.bm.on{color:var(--accent);}
.tact.bm.on svg{fill:var(--accent);}
.tact.del:hover{background:rgba(249,24,128,0.1);color:var(--like);}

/* ── RIGHT SIDEBAR ── */
.rside{
  padding:0.85rem 1rem;height:100vh;height:100dvh;
  overflow-y:auto;display:flex;flex-direction:column;gap:1rem;
}
.search-wrap{
  background:var(--bg3);border-radius:25px;
  display:flex;align-items:center;gap:0.5rem;
  padding:0.65rem 1rem;border:1px solid transparent;
  transition:all 0.15s;
}
.search-wrap:focus-within{background:var(--bg);border-color:var(--accent);}
.search-wrap input{
  background:transparent;border:none;color:var(--txt);
  font-family:inherit;font-size:0.9rem;outline:none;width:100%;
}
.search-wrap input::placeholder{color:var(--txt2);}
.card{background:var(--bg2);border-radius:16px;overflow:hidden;}
.card-title{font-weight:700;font-size:0.95rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);}
.trend{padding:0.75rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.trend:last-child{border-bottom:none;}
.trend:hover{background:var(--bg3);}
.trend-cat{font-size:0.72rem;color:var(--txt2);}
.trend-tag{font-weight:700;font-size:0.93rem;}
.trend-num{font-size:0.75rem;color:var(--txt2);margin-top:0.1rem;}
.suggest{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);transition:background 0.15s;}
.suggest:last-child{border-bottom:none;}
.suggest:hover{background:var(--bg3);}
.suggest-info{flex:1;min-width:0;}
.suggest-name{font-weight:700;font-size:0.88rem;}
.suggest-handle{color:var(--txt2);font-size:0.8rem;}
.follow-btn{
  padding:0.4rem 1rem;border:1.5px solid var(--txt);
  border-radius:20px;background:transparent;color:var(--txt);
  font-weight:700;font-size:0.8rem;cursor:pointer;
  font-family:inherit;transition:all 0.15s;flex-shrink:0;
  min-height:36px;
}
.follow-btn:hover{background:var(--txt);color:var(--bg);}
.follow-btn.following{border-color:var(--txt2);color:var(--txt2);}
.theme-btn{
  padding:0.65rem 1rem;border:1px solid var(--border);
  border-radius:20px;background:transparent;color:var(--txt);
  font-family:inherit;font-size:0.85rem;cursor:pointer;
  display:flex;align-items:center;gap:0.5rem;transition:all 0.15s;
}
.theme-btn:hover{background:var(--bg3);}
.logout-btn{
  padding:0.65rem 1rem;border:1.5px solid var(--like);
  border-radius:20px;background:transparent;color:var(--like);
  font-family:inherit;font-size:0.85rem;cursor:pointer;
  font-weight:700;transition:all 0.15s;
}
.logout-btn:hover{background:var(--like);color:#fff;}

/* ── PROFILE ── */
.cover{height:160px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);position:relative;overflow:hidden;}
.cover-btn{position:absolute;bottom:0.6rem;left:0.6rem;padding:0.35rem 0.8rem;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:15px;cursor:pointer;font-family:inherit;font-size:0.8rem;}
.profile-meta{padding:0.75rem 1rem 0;}
.ava-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;}
.ava-xl{margin-top:-44px;position:relative;}
.ava-cam{position:absolute;bottom:0;left:0;width:30px;height:30px;background:var(--accent);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ava-cam svg{width:14px;height:14px;color:#fff;}
.edit-btn{padding:0.45rem 1.1rem;border:1.5px solid var(--accent);color:var(--accent);background:transparent;border-radius:20px;cursor:pointer;font-weight:700;font-size:0.85rem;font-family:inherit;transition:all 0.15s;min-height:40px;}
.edit-btn:hover{background:rgba(29,155,240,0.1);}
.pname{font-weight:700;font-size:1.15rem;}
.phandle{color:var(--txt2);font-size:0.9rem;margin-bottom:0.4rem;}
.pbio{font-size:0.9rem;color:var(--txt);line-height:1.5;margin-bottom:0.6rem;}
.pstats{display:flex;gap:1.5rem;}
.pstat span{font-weight:700;}
.pstat small{color:var(--txt2);font-size:0.85rem;}
.ptabs{display:flex;border-bottom:1px solid var(--border);margin-top:0.75rem;}
.ptab{flex:1;padding:0.75rem;text-align:center;cursor:pointer;font-weight:600;font-size:0.88rem;color:var(--txt2);border-bottom:2.5px solid transparent;transition:all 0.15s;}
.ptab.active{color:var(--accent);border-color:var(--accent);}
.ptab:hover{background:var(--bg3);}
.empty-state{padding:3rem 1rem;text-align:center;color:var(--txt2);}
.empty-state svg{width:44px;height:44px;margin-bottom:0.75rem;opacity:0.35;}
.empty-state p{font-size:0.9rem;line-height:1.6;}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:18px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;max-height:90dvh;overflow-y:auto;position:relative;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-head h3{font-size:1.1rem;font-weight:700;}
.close-btn{background:none;border:none;cursor:pointer;color:var(--txt);padding:0.3rem;border-radius:50%;display:flex;min-width:44px;min-height:44px;align-items:center;justify-content:center;transition:background 0.15s;}
.close-btn:hover{background:var(--bg3);}
.close-btn svg{width:20px;height:20px;}
.form-g{margin-bottom:1rem;}
.form-g label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:0.35rem;color:var(--txt2);}
.form-g input,.form-g textarea{width:100%;padding:0.7rem 0.9rem;border:1px solid var(--border);border-radius:10px;font-family:inherit;color:var(--txt);background:var(--bg2);font-size:0.95rem;transition:border 0.15s;}
.form-g input:focus,.form-g textarea:focus{outline:none;border-color:var(--accent);background:var(--bg);}
.form-g textarea{resize:vertical;min-height:80px;}
.form-submit{width:100%;padding:0.75rem;background:var(--accent);color:#fff;border:none;border-radius:20px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.95rem;transition:background 0.15s;min-height:48px;}
.form-submit:hover{background:var(--accent2);}
.err{color:var(--like);font-size:0.82rem;margin-top:0.35rem;}

/* ── AUTH ── */
.auth-page{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1rem;}
.auth-box{background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:400px;}
.auth-logo{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:1.5rem;color:var(--txt);}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.auth-tab{flex:1;padding:0.7rem;text-align:center;cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--txt2);border-bottom:2.5px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.auth-tab.active{color:var(--accent);border-color:var(--accent);}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 0.75rem);left:50%;transform:translateX(-50%);z-index:350;display:flex;flex-direction:column;gap:0.4rem;pointer-events:none;align-items:center;}
.toast{background:#1c1c1e;color:#fff;padding:0.7rem 1.3rem;border-radius:20px;font-size:0.87rem;font-weight:500;animation:toastIn 0.25s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
html.dark .toast{background:#e7e9ea;color:#000;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.toast.out{animation:toastOut 0.3s ease forwards;}
@keyframes toastOut{to{opacity:0;transform:translateY(8px);}}

/* ── MOBILE NAV BAR (FIXED) ── */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.94);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  z-index:150;
  padding-bottom:var(--safe-bottom);
  height:calc(var(--nav-h) + var(--safe-bottom));
}
html.dark .mobile-nav{background:rgba(0,0,0,0.94);}
.mobile-nav-inner{
  display:flex;justify-content:space-around;align-items:center;
  height:var(--nav-h);padding:0 0.25rem;
}
@media(max-width:640px){.mobile-nav{display:block;}}
.mnav-btn{
  background:none;border:none;cursor:pointer;color:var(--txt2);
  padding:0.45rem 0.65rem;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;
  font-size:0.6rem;font-family:inherit;
  transition:color 0.15s,background 0.15s;
  min-width:52px;min-height:48px;justify-content:center;
}
.mnav-btn svg{width:24px;height:24px;}
.mnav-btn.active{color:var(--accent);}
.mnav-fab{
  background:var(--accent);color:#fff !important;
  border-radius:50%;width:50px;height:50px;min-width:50px;min-height:50px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(29,155,240,0.45);
  transition:transform 0.15s,background 0.15s;
  padding:0;
}
.mnav-fab:hover{background:var(--accent2) !important;}
.mnav-fab:active{transform:scale(0.93);}

/* ── DROPDOWN MENU ── */
.ddmenu{position:relative;display:inline-block;}
.ddmenu-btn{background:none;border:none;cursor:pointer;color:var(--txt2);padding:0.3rem 0.4rem;border-radius:50%;display:flex;transition:all 0.15s;min-width:36px;min-height:36px;align-items:center;justify-content:center;}
.ddmenu-btn:hover{background:var(--bg3);color:var(--txt);}
.ddmenu-list{display:none;position:absolute;left:0;top:calc(100% + 4px);background:var(--bg);border:1px solid var(--border);border-radius:14px;min-width:190px;z-index:120;box-shadow:0 8px 28px var(--shadow);overflow:hidden;}
.ddmenu-list.open{display:block;animation:dropIn 0.18s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.dditem{display:flex;align-items:center;gap:0.65rem;padding:0.7rem 1rem;cursor:pointer;font-size:0.88rem;transition:background 0.12s;color:var(--txt);border:none;background:transparent;font-family:inherit;width:100%;text-align:right;min-height:44px;}
.dditem:hover{background:var(--bg3);}
.dditem.danger{color:var(--like);}
.dditem svg{width:16px;height:16px;flex-shrink:0;}

/* ── EMOJI PICKER ── */
.emoji-picker{display:none;position:absolute;bottom:calc(100% + 6px);right:0;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:0.6rem;z-index:220;box-shadow:0 8px 28px var(--shadow);width:min(290px,90vw);}
.emoji-picker.open{display:block;animation:dropIn 0.18s ease;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;max-height:150px;overflow-y:auto;}
.emoji-btn{background:none;border:none;cursor:pointer;padding:0.3rem 0.2rem;border-radius:8px;transition:background 0.12s,color 0.12s;min-width:44px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt);gap:3px;}
.emoji-btn:active{background:var(--bg3);}
.emoji-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:square;stroke-linejoin:miter;flex-shrink:0;}
.emoji-btn .elabel{font-size:0.48rem;color:var(--txt2);line-height:1;max-width:42px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.emoji-btn:hover{background:var(--bg3);color:var(--accent);}
.emoji-search{width:100%;padding:0.4rem 0.7rem;border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:0.85rem;background:var(--bg2);color:var(--txt);outline:none;margin-bottom:0.4rem;}

/* ── SHARE POPUP ── */
.share-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:1.5rem;z-index:310;width:90%;max-width:360px;box-shadow:0 10px 50px rgba(0,0,0,0.25);}
.share-popup.hidden{display:none;}
.share-link{width:100%;padding:0.55rem 0.85rem;border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:0.85rem;background:var(--bg2);color:var(--txt);outline:none;margin-bottom:0.75rem;}
.share-actions{display:flex;gap:0.5rem;flex-wrap:wrap;}
.share-action-btn{flex:1;padding:0.55rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--txt);font-family:inherit;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.4rem;transition:all 0.15s;min-width:80px;min-height:44px;}
.share-action-btn:hover{background:var(--bg3);}

/* ── MISC ── */
.reply-line{width:2px;background:var(--border);margin:0.3rem auto;flex:1;min-height:20px;}
.badge{background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:0.62rem;display:inline-flex;align-items:center;justify-content:center;font-weight:700;margin-right:auto;}
input[type=file]{display:none;}

@media(max-width:640px){
  .mobile-logo{display:block !important;}
}


/* ── PULL TO REFRESH ── */
.ptr-indicator{
  display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;transition:height 0.2s ease;
  color:var(--txt2);font-size:0.85rem;gap:0.5rem;
}
.ptr-indicator.visible{height:44px;}
.ptr-spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── REPORT MODAL ── */
#reportModal .dditem{border-bottom:1px solid var(--border);width:100%;justify-content:flex-start;}
#editTweetModal .form-g textarea{min-height:100px;}

function renderFeed(){
  const container=document.getElementById('tweetsContainer');
  const sorted=[...db.tweets].sort((a,b)=>b.ts-a.ts);

  container.innerHTML=top.map(t=>tweetCard(t,false,false)).join('');
}

  const timeStr = relTime(tweet.ts);
  const textHtml = formatText(tweet.text);
  const replyCount = (tweet.replies||[]).length;

  return `<div class="tweet" id="tw-${tweet.id}" onclick="handleTweetClick(event,'${tweet.id}')">
    <div class="tweet-inner">
      <div onclick="event.stopPropagation();nav('profile','${author.id}')" style="cursor:pointer">${avaHtml(author,44)}</div>

        <div class="tweet-text">${textHtml}</div>
        ${tweet.img?`<img class="tweet-img" src="${tweet.img}" onclick="event.stopPropagation()" loading="lazy">`:''}
        <div class="tweet-actions" onclick="event.stopPropagation()">
          <button class="tact" onclick="openReply('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${replyCount||''}
          </button>
          <button class="tact rt ${retweeted?'on':''}" onclick="doRetweet('${tweet.id}')">

            ${tweet.likes.length||''}
          </button>

            <svg viewBox="0 0 24 24" fill="${bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>

function renderTweetDetail(id){
  const tweet = getTweetById(id);
  if(!tweet){document.getElementById('tweetDetailContent').innerHTML='<div class="empty-state"><p>التغريدة غير موجودة</p></div>';return;}
  let html = tweetCard(tweet, true, false);
  // reply composer
  html += `<div class="composer" style="border-top:1px solid var(--border)">
    <div class="ava ava-md">${avaHtml(me,44)}</div>
    <div class="composer-right">
      <textarea id="replyTxt" placeholder="أضف ردك..." oninput="updateReplyComposer(this)" rows="2" style="width:100%;background:transparent;border:none;color:var(--txt);font-size:1rem;font-family:inherit;resize:none;outline:none;min-height:50px;padding-top:0.35rem"></textarea>

        <button class="post-btn" id="replyPostBtn" disabled onclick="postReply('${id}')">رد</button>
      </div>
    </div>
  </div>`;
  // replies
  const replies = (tweet.replies||[]).map(rid=>getTweetById(rid)).filter(Boolean).sort((a,b)=>a.ts-b.ts);
  if(replies.length) html += `<div style="padding-top:0.5rem">`+replies.map(r=>tweetCard(r,false,true)).join('')+`</div>`;
  document.getElementById('tweetDetailContent').innerHTML=html;
}

  await createTweet(text, null, pendingImg.composer);
  sv('composerTxt','');
  pendingImg.composer=null;
  document.getElementById('composerImgPreview').innerHTML='';
  document.getElementById('postBtn').disabled=true;
  document.getElementById('charCount').textContent=MAX_CHARS;
  document.getElementById('charCount').className='char-count';
  renderFeed();
  toast('تم النشر بنجاح ✓');
}

async function postFromModal(){
  const text = v('modalTxt').trim();
  const replyTo = v('replyToId');
  if(!text && !pendingImg.modal) return;
  const tw = await createTweet(text, replyTo||null, pendingImg.modal);
  if(replyTo){
    const parent = getTweetById(replyTo);
    if(parent){
      if(!parent.replies) parent.replies=[];
      parent.replies.push(tw.id);
      // update parent replies in Supabase
      await _supabase.from('tweets').update({ replies: parent.replies }).eq('id', replyTo);
      if(parent.uid !== me.id){ addNotif(parent.uid,'reply',tw.id,me.id); }
    }
  }
  sv('modalTxt',''); sv('replyToId','');
  pendingImg.modal=null;
  document.getElementById('modalImgPreview').innerHTML='';
  document.getElementById('modalPostBtn').disabled=true;
  document.getElementById('modalCharCount').textContent=MAX_CHARS;
  closeModal('composeModal');
  if(currentPage==='home') renderFeed();
  if(currentPage==='tweet') renderTweetDetail(replyTo||tw.id);
  toast(replyTo?'تم إرسال الرد ✓':'تم النشر ✓');
}

async function createTweet(text, replyTo=null, img=null){
  const tw = {id:'t'+Date.now(), uid:me.id, text, ts:Date.now(), likes:[], retweets:[], replies:[], replyTo, img};
  const { data, error } = await _supabase.from('tweets').insert([tw]).select().single();
  if (!error && data) {
    db.tweets.unshift(data);
    return data;
  }
  // fallback local
  db.tweets.unshift(tw);
  return tw;
}

async function postReply(parentId){
  const text=v('replyTxt').trim();
  if(!text) return;
  const tw = await createTweet(text,parentId,null);
  const parent=getTweetById(parentId);
  if(parent){
    if(!parent.replies) parent.replies=[];
    parent.replies.push(tw.id);
    await _supabase.from('tweets').update({ replies: parent.replies }).eq('id', parentId);
    if(parent.uid!==me.id) addNotif(parent.uid,'reply',tw.id,me.id);
  }
  renderTweetDetail(parentId);
  toast('تم إرسال الرد ✓');
}

async function doLike(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const idx=tw.likes.indexOf(me.id);
  if(idx>=0) tw.likes.splice(idx,1);
  else {
    tw.likes.push(me.id);
    if(tw.uid!==me.id) addNotif(tw.uid,'like',id,me.id);
  }
  await _supabase.from('tweets').update({ likes: tw.likes }).eq('id', id);
  refreshTweetCard(id);
  updateNotifBadge();
}

async function doRetweet(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const idx=tw.retweets.indexOf(me.id);
  if(idx>=0){tw.retweets.splice(idx,1);toast('تم إلغاء إعادة النشر');}
  else {
    tw.retweets.push(me.id);
    if(tw.uid!==me.id) addNotif(tw.uid,'retweet',id,me.id);
    toast('تمت إعادة النشر ✓');
  }
  await _supabase.from('tweets').update({ retweets: tw.retweets }).eq('id', id);
  refreshTweetCard(id);
  updateNotifBadge();
}

async function doBookmark(id){
  if(!me.bookmarks) me.bookmarks=[];
  const idx=me.bookmarks.indexOf(id);
  if(idx>=0){me.bookmarks.splice(idx,1);toast('تمت إزالته من المحفوظات');}
  else {me.bookmarks.push(id);toast('تمت إضافته للمحفوظات ✓');}
  db.users[me.email]=me;
  await _supabase.from('users').update({ bookmarks: me.bookmarks }).eq('id', me.id);
  refreshTweetCard(id);
}

async function deleteTweet(id){
  if(!confirm('هل أنت متأكد من حذف هذه التغريدة؟')) return;
  const idx=db.tweets.findIndex(t=>t.id===id);
  if(idx>=0) db.tweets.splice(idx,1);
  db.tweets.forEach(t=>{if(t.replies) t.replies=t.replies.filter(r=>r!==id);});
  if(me.bookmarks) me.bookmarks=me.bookmarks.filter(b=>b!==id);
  db.users[me.email]=me;
  await _supabase.from('tweets').delete().eq('id', id);
  const el=document.getElementById('tw-'+id);
  if(el) el.remove();
  toast('تم حذف التغريدة');
  if(currentPage==='tweet') goBack();
}

function refreshTweetCard(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const el=document.getElementById('tw-'+id);
  if(!el) return;
  el.outerHTML=tweetCard(tw,false,false);
}

function removeImg(target){

  const previewId=target==='composer'?'composerImgPreview':'modalImgPreview';
  document.getElementById(previewId).innerHTML='';
  if(target==='composer'){
    const txt=document.getElementById('composerTxt');
    document.getElementById('postBtn').disabled=txt.value.trim().length===0;
  } else {
    const txt=document.getElementById('modalTxt');
    document.getElementById('modalPostBtn').disabled=txt.value.trim().length===0;
  }
}

      </div>
      ${isMine?`<button class="edit-btn" onclick="openEditProfile()">تعديل الملف</button>`:
        `<button class="edit-btn ${isFollowing?'':'follow-btn'}" onclick="toggleFollow('${user.id}')">${isFollowing?'متابَع ✓':'متابعة'}</button>`}
    </div>
    <div class="pname">${esc(user.name)}</div>
    <div class="phandle">@${esc(user.handle)}</div>
    ${user.bio?`<div class="pbio">${esc(user.bio)}</div>`:''}

function switchProfileTab(tab, userId){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.getElementById('ptab-'+tab).classList.add('active');
  const user=getUserById(userId)||me;
  let tweets=[];
  if(tab==='tweets') tweets=db.tweets.filter(t=>t.uid===user.id&&!t.replyTo).sort((a,b)=>b.ts-a.ts);
  else if(tab==='replies') tweets=db.tweets.filter(t=>t.uid===user.id&&t.replyTo).sort((a,b)=>b.ts-a.ts);
  else if(tab==='likes') tweets=db.tweets.filter(t=>t.likes.includes(me.id)).sort((a,b)=>b.ts-a.ts);
  document.getElementById('profileTweets').innerHTML=
    tweets.length?tweets.map(t=>tweetCard(t,false,false)).join(''):`<div class="empty-state"><p>لا يوجد محتوى</p></div>`;
}

function openEditProfile(){
  sv('ed-name',me.name); sv('ed-handle',me.handle); sv('ed-bio',me.bio||'');

async function saveProfile(){
  const name=v('ed-name').trim();
  const handle=v('ed-handle').trim().replace(/\s+/g,'_').toLowerCase();
  const bio=v('ed-bio').trim();
  if(!name||!handle){document.getElementById('ed-err').textContent='الاسم واسم المستخدم مطلوبان';return;}
  const taken=Object.values(db.users).filter(u=>u.id!==me.id).map(u=>u.handle);
  if(taken.includes(handle)){document.getElementById('ed-err').textContent='اسم المستخدم محجوز';return;}
  me.name=name; me.handle=handle; me.bio=bio;
  db.users[me.email]=me;
  await _supabase.from('users').update({ name, handle, bio }).eq('id', me.id);
  closeModal('editModal');
  updateSidebar(); renderProfile(); toast('تم حفظ التغييرات ✓');
}

function uploadAvatar(){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=e=>{
    const f=e.target.files[0];
    const r=new FileReader();
    r.onload=async ev=>{
      me.avatar=ev.target.result;
      db.users[me.email]=me;
      await _supabase.from('users').update({ avatar: me.avatar }).eq('id', me.id);
      updateSidebar(); renderProfile(); toast('تم تحديث الصورة ✓');
    };
    r.readAsDataURL(f);
  };
  input.click();
}

async function toggleFollow(userId){
  const target=getUserById(userId);
  if(!target) return;
  if(!me.following) me.following=[];
  if(!target.followers) target.followers=[];
  const idx=me.following.indexOf(userId);
  if(idx>=0){
    me.following.splice(idx,1);
    target.followers=target.followers.filter(f=>f!==me.id);
    toast('تم إلغاء المتابعة');
  } else {
    me.following.push(userId);
    target.followers.push(me.id);
    addNotif(userId,'follow',null,me.id);
    toast('تمت المتابعة ✓');
  }
  db.users[me.email]=me;
  const tEmail=Object.keys(db.users).find(k=>db.users[k].id===userId);
  if(tEmail) db.users[tEmail]=target;
  await _supabase.from('users').update({ following: me.following }).eq('id', me.id);
  await _supabase.from('users').update({ followers: target.followers }).eq('id', userId);
  updateNotifBadge();
  renderProfile(userId);
  renderSuggestions();
}

function getTrends(){
  const tags={};
  db.tweets.forEach(t=>{
    const matches=t.text.match(/#[\u0600-\u06FFa-zA-Z0-9_]+/g)||[];
    matches.forEach(tag=>{tags[tag]=(tags[tag]||0)+1;});
  });
  return Object.entries(tags).sort((a,b)=>b[1]-a[1]).slice(0,5);
}

function renderTrends(){
  const trends=getTrends();
  const staticTrends=[['#القرآن_الكريم',245300],['#الفقه_الإسلامي',189200],['#السيرة_النبوية',156800],['#العقيدة',132500]];
  const all=[...trends.map(([t,n])=>[t,n]),...staticTrends].slice(0,5);
  document.getElementById('trendsContent').innerHTML=all.map(([tag,num])=>
    `<div class="trend" onclick="searchByTag('${tag}')">
      <div class="trend-cat">ترند</div>
      <div class="trend-tag">${esc(tag)}</div>
      <div class="trend-num">${fmtNum(num)} تغريدة</div>
    </div>`).join('');
}

function renderExploreTrends(){
  const trends=getTrends();
  const staticTrends=[['#القرآن_الكريم',245300],['#الفقه_الإسلامي',189200],['#السيرة_النبوية',156800],['#العقيدة',132500],['#رمضان',98700],['#الصلاة',75300]];
  const all=[...trends.map(([t,n])=>[t,n]),...staticTrends].slice(0,8);
  document.getElementById('exploreTrends').innerHTML=`<div class="card" style="margin:0.75rem 1rem"><div class="card-title">مواضيع رائجة</div>`
    +all.map(([tag,num])=>`<div class="trend" onclick="searchByTag('${tag}')">`+
      `<div class="trend-cat">ترند</div><div class="trend-tag">${esc(tag)}</div><div class="trend-num">${fmtNum(num)} تغريدة</div></div>`).join('')
    +`</div>`;
}

function renderSuggestions(){
  const others=Object.values(db.users).filter(u=>u.id!==me.id).slice(0,4);
  if(!others.length){document.getElementById('suggestContent').innerHTML='<div style="padding:1rem;color:var(--txt2);font-size:0.85rem;text-align:center">لا توجد اقتراحات</div>';return;}
  document.getElementById('suggestContent').innerHTML=others.map(u=>{
    const isFollowing=me.following&&me.following.includes(u.id);
    return `<div class="suggest">
      <div onclick="nav('profile','${u.id}')" style="cursor:pointer">${avaHtml(u,36)}</div>
      <div class="suggest-info" onclick="nav('profile','${u.id}')" style="cursor:pointer">
        <div class="suggest-name">${esc(u.name)}</div>
        <div class="suggest-handle">@${esc(u.handle)}</div>
      </div>
      <button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${u.id}')">${isFollowing?'متابَع':'متابعة'}</button>
    </div>`;
  }).join('');
}

function searchByTag(tag){
  nav('explore');
  const input=document.getElementById('exploreSearch');
  input.value=tag; doSearch(tag);
}

function doSearch(q){
  q=q.trim().toLowerCase();
  document.getElementById('exploreTrends').style.display=q?'none':'block';
  if(!q){document.getElementById('searchResults').innerHTML='';return;}
  // tweets
  const tweetMatches=db.tweets.filter(t=>t.text.toLowerCase().includes(q)).sort((a,b)=>b.ts-a.ts);
  // users
  const userMatches=Object.values(db.users).filter(u=>u.name.toLowerCase().includes(q)||u.handle.toLowerCase().includes(q)||('@'+u.handle).includes(q));
  let html='';
  if(userMatches.length){
    html+=`<div style="padding:0.75rem 1rem;font-weight:700;border-bottom:1px solid var(--border)">مستخدمون</div>`;
    html+=userMatches.map(u=>{
      const isFollowing=me.following&&me.following.includes(u.id);
      return `<div class="suggest" style="padding:0.85rem 1rem">
        <div onclick="nav('profile','${u.id}')" style="cursor:pointer">${avaHtml(u,40)}</div>
        <div class="suggest-info" onclick="nav('profile','${u.id}')" style="cursor:pointer">
          <div class="suggest-name">${esc(u.name)}</div>
          <div class="suggest-handle">@${esc(u.handle)}</div>
          ${u.bio?`<div style="font-size:0.82rem;color:var(--txt2);margin-top:0.15rem">${esc(u.bio.slice(0,60))}</div>`:''}
        </div>
        <button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${u.id}')">${isFollowing?'متابَع':'متابعة'}</button>
      </div>`;
    }).join('');
  }
  if(tweetMatches.length){
    html+=`<div style="padding:0.75rem 1rem;font-weight:700;border-bottom:1px solid var(--border);border-top:1px solid var(--border)">تغريدات</div>`;
    html+=tweetMatches.map(t=>tweetCard(t,false,false)).join('');
  }
  if(!html) html=`<div class="empty-state"><p>لا توجد نتائج لـ "${esc(q)}"</p></div>`;
  document.getElementById('searchResults').innerHTML=html;
}

function sideSearch(q){
  if(!q.trim()) return;
  nav('explore');
  document.getElementById('exploreSearch').value=q;
  doSearch(q);
}

function esc(s){if(!s) return '';const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function getTweetById(id){return db.tweets.find(t=>t.id===id);}
function getUserById(id){return Object.values(db.users).find(u=>u.id===id);}

function relTime(ts){
  const diff=(Date.now()-ts)/1000;
  if(diff<60) return 'الآن';
  if(diff<3600) return `${Math.floor(diff/60)}د`;
  if(diff<86400) return `${Math.floor(diff/3600)}س`;
  if(diff<604800) return `${Math.floor(diff/86400)}ي`;
  return new Date(ts).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
}

function fmtNum(n){if(n>=1000) return (n/1000).toFixed(1)+'K';return n;}

function formatText(text){
  if(!text) return '';
  let t=esc(text);
  // hashtags
  t=t.replace(/#([\u0600-\u06FFa-zA-Z0-9_]+)/g,'<a href="#" onclick="event.preventDefault();searchByTag(\'#$1\')">#$1</a>');
  // mentions
  t=t.replace(/@([a-zA-Z0-9_\u0600-\u06FF]+)/g,(m,h)=>{
    const u=Object.values(db.users).find(u=>u.handle===h);
    return u?`<a href="#" onclick="event.preventDefault();nav('profile','${u.id}')">@${h}</a>`:m;
  });
  // links
  t=t.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return t;
}

// MUTE / BLOCK
// ============================================================
async function toggleMute(userId){
  if(!me.muted) me.muted=[];
  const idx=me.muted.indexOf(userId);
  if(idx>=0){me.muted.splice(idx,1);toast('تم إلغاء الكتم');}
  else {me.muted.push(userId);toast('تم كتم المستخدم ✓');}
  db.users[me.email]=me;
  await _supabase.from('users').update({ muted: me.muted }).eq('id', me.id);
  if(currentPage==='home') renderFeed();
}
async function toggleBlock(userId){
  if(!me.blocked) me.blocked=[];
  const idx=me.blocked.indexOf(userId);
  if(idx>=0){me.blocked.splice(idx,1);toast('تم إلغاء الحظر');}
  else {
    me.blocked.push(userId);
    if(me.following) me.following=me.following.filter(f=>f!==userId);
    toast('تم حظر المستخدم ✓');
  }
  db.users[me.email]=me;
  await _supabase.from('users').update({ blocked: me.blocked, following: me.following||[] }).eq('id', me.id);
  if(currentPage==='home') renderFeed();
}

// ── RENDER ──────────────────────────────────────────────────────────────
function emojiSvg(item){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">${item.s}</svg>`;
}
function emojiHtml(item,targetId){
  return `<button class="emoji-btn" title="${item.l}" onclick="insertEmoji(event,'${item.v}','${targetId}')">${emojiSvg(item)}<span class="elabel">${item.l}</span></button>`;
}
function openEmojiPicker(targetId){
  document.querySelectorAll('.emoji-picker.open').forEach(p=>p.classList.remove('open'));
  const picker=document.getElementById('emoji-picker-'+targetId);
  if(!picker) return;
  const grid=document.getElementById('emoji-grid-'+targetId);
  if(grid && !grid.children.length) grid.innerHTML=EMOJIS.map(e=>emojiHtml(e,targetId)).join('');
  picker.classList.toggle('open');
}
function filterEmoji(q,targetId){
  const grid=document.getElementById('emoji-grid-'+targetId);
  if(!grid) return;
  const list=q?EMOJIS.filter(e=>e.l.includes(q)):EMOJIS;
  grid.innerHTML=list.map(e=>emojiHtml(e,targetId)).join('');
}
function insertEmoji(ev,val,targetId){
  ev.stopPropagation();
  const ta=document.getElementById(targetId);
  if(!ta) return;
  const pos=ta.selectionStart||0;
  ta.value=ta.value.slice(0,pos)+val+ta.value.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+val.length;
  ta.focus();
  if(targetId==='composerTxt') updateComposer(ta);
  if(targetId==='modalTxt') updateModalComposer(ta);
  if(targetId==='replyTxt') updateReplyComposer(ta);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.emoji-picker')&&!e.target.closest('.icon-btn'))
    document.querySelectorAll('.emoji-picker.open').forEach(p=>p.classList.remove('open'));
});

// keyboard shortcuts
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();nav('explore');document.getElementById('exploreSearch').focus();}
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(m=>m.classList.remove('open'));
  }
});

// ============================================================
// DRAWER (mobile sidebar)
// ============================================================
function openDrawer(){
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('drawerOverlay');
  if(!sb||!ov) return;
  sb.classList.add('drawer-open');
  ov.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('drawerOverlay');
  if(!sb||!ov) return;
  sb.classList.remove('drawer-open');
  ov.classList.remove('open');
  document.body.style.overflow='';
}
