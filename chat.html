<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسأل الإسلام AI - بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Amiri+Quran&display=swap" rel="stylesheet">
    <style>
        /* ========== Reset ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0ece3;
            --bg-secondary: #e8e3d8;
            --bg-chat: #e0dbd0;
            --bg-card: #ffffff;
            --text-primary: #1a1613;
            --text-secondary: #6b6560;
            --text-descriptive: #4a4540;
            --accent: #cc785c;
            --accent-hover: #b8664a;
            --border: rgba(26, 22, 19, 0.10);
            --border-strong: rgba(26, 22, 19, 0.18);
            --border-subtle: rgba(26, 22, 19, 0.08);
            --shadow-sm: 0 2px 12px rgba(26,22,19,0.13);
            --shadow-md: 0 6px 28px rgba(26,22,19,0.17);
            --shadow-lg: 0 12px 48px rgba(26,22,19,0.22);
            --sidebar-width: 280px;
            --header-height: 68px;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            padding-top: var(--header-height);
        }

        /* ========== Header ========== */
        .header {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: var(--header-height);
            background: rgba(240, 236, 227, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem;
            z-index: 9000;
        }

        .header-inner {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-title img.header-logo {
            height: 80px;
            width: auto;
            display: block;
            filter: none;
        }

        /* زر السلايدبار في الهيدر */
        .sidebar-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            color: var(--text-secondary);
        }

        .sidebar-toggle:hover {
            background: var(--bg-secondary);
            border-color: var(--border-strong);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .sidebar-toggle svg {
            width: 18px;
            height: 18px;
        }

        /* ========== Sidebar ========== */
        .sidebar {
            position: fixed;
            top: 0;
            right: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar.open { right: 0; }

        .sidebar-header {
            padding: 1.1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            background: var(--bg-card);
        }

        .sidebar-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-header #userSection {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            justify-content: center;
        }

        .close-sidebar {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-sidebar:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-content::-webkit-scrollbar { width: 4px; }
        .sidebar-content::-webkit-scrollbar-track { background: transparent; }
        .sidebar-content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

        .history-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.7rem 0.8rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            box-shadow: 0 2px 10px rgba(26,22,19,0.09);
        }

        .history-item-content { flex: 1; min-width: 0; }

        .history-delete-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s;
            flex-shrink: 0;
            opacity: 0;
        }

        .history-item:hover .history-delete-btn { opacity: 1; }
        .history-delete-btn:hover { background: #fee2e2; color: #ef4444; }

        .history-item:hover {
            border-color: var(--border-strong);
            background: var(--bg-secondary);
            transform: translateX(-2px);
        }

        .history-question {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            font-size: 0.82rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-answer {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .history-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 2.5rem 0;
            font-size: 0.85rem;
        }

        .sidebar-footer {
            padding: 0.8rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }

        .clear-history-btn {
            width: 100%;
            padding: 0.65rem;
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            font-family: inherit;
        }

        .clear-history-btn:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Login / Logout buttons */
        .login-btn, .logout-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-strong);
            color: var(--text-primary);
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .login-btn:hover, .logout-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ========== Main Chat Area ========== */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 1rem 0;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

        /* ========== Messages ========== */
        .message {
            display: flex;
            gap: 0.9rem;
            align-items: flex-start;
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .message.user .message-avatar {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .message.assistant .message-avatar {
            background: transparent;
            border: none;
            overflow: hidden;
            padding: 0;
        }

        .message.assistant .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: none;
        }

        .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.9rem 1.1rem;
            max-width: 78%;
            line-height: 1.7;
            font-size: 0.93rem;
            box-shadow: 0 2px 16px rgba(26,22,19,0.12), 0 1px 4px rgba(26,22,19,0.08);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .message.assistant .message-content {
            background: var(--bg-card);
        }

        /* ========== Welcome ========== */
        .welcome-message {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            box-shadow: 0 4px 24px rgba(26,22,19,0.13), 0 1px 6px rgba(26,22,19,0.08);
        }

        .welcome-greeting {
            font-family: 'Amiri Quran';
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }

        .welcome-text {
            color: var(--text-descriptive);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.8;
        }

        .help-points {
            text-align: right;
            list-style: none;
            padding: 0;
            margin: 0.8rem 0;
        }

        .help-points li {
            padding: 0.35rem 0;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .help-points li::before {
            content: "• ";
            color: var(--accent);
            font-weight: bold;
            margin-left: 0.4rem;
        }

        .welcome-prompt {
            color: var(--accent);
            font-weight: 500;
            margin-top: 0.8rem;
            font-size: 0.9rem;
        }

        .quick-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.55rem 1.1rem;
            border-radius: 24px;
            font-size: 0.84rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        /* ========== Typing ========== */
        .typing-indicator {
            display: none;
            padding: 0.8rem 0 0.8rem 3.2rem;
            align-items: center;
            gap: 0.8rem;
        }

        .typing-indicator.active { display: flex; }

        /* Gemini-style spinning logo */
        .typing-logo-wrap {
            position: relative;
            width: 56px;
            height: 56px;
            flex-shrink: 0;
        }

        .typing-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0;
            background: transparent;
            padding: 0;
            filter: none;
        }

        /* دوران لوني Gemini */
        .typing-logo-ring {
            position: absolute;
            inset: -3px;
            border-radius: 11px;
            background: conic-gradient(
                from 0deg,
                var(--accent),
                #e8b89a,
                #d4c5b0,
                var(--accent),
                #cc785c,
                transparent 60%
            );
            animation: gemini-spin 1.6s linear infinite;
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), black calc(100% - 3px));
        }

        @keyframes gemini-spin {
            0%   { transform: rotate(0deg);   }
            100% { transform: rotate(360deg); }
        }

        .typing-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            animation: typing-fade 1.4s ease-in-out infinite;
        }

        @keyframes typing-fade {
            0%, 100% { opacity: 0.5; }
            50%       { opacity: 1;   }
        }

        /* ========== Input Area ========== */
        .input-area {
            padding: 1rem 0 1.5rem;
            background: transparent;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.9rem 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 24px rgba(26,22,19,0.13), 0 1px 6px rgba(26,22,19,0.07);
        }

        .input-wrapper:focus-within {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-md);
        }

        .input-top-row {
            display: flex;
            align-items: flex-end;
            gap: 0.7rem;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.94rem;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.6;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .input-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-icons {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        /* أزرار أدوات الإدخال */
        .input-tool-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .input-tool-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .input-tool-btn svg {
            width: 18px;
            height: 18px;
        }

        /* زر الإرسال */
        .send-btn {
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(204,120,92,0.35);
        }

        .send-btn:active:not(:disabled) { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Tool buttons below input */
        .tool-btns-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-family: inherit;
        }

        .tool-btn:hover {
            background: var(--bg-chat);
            border-color: var(--border-strong);
            color: var(--text-primary);
        }

        /* ========== Message Actions ========== */
        .message-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.7rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .message:hover .message-actions { opacity: 1; }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--border-strong);
            color: var(--text-primary);
        }

        .action-btn.active-like { color: #16a34a; border-color: #16a34a; background: #f0fdf4; }
        .action-btn.active-dislike { color: #ef4444; border-color: #ef4444; background: #fef2f2; }
        .action-btn.copied { color: #16a34a; border-color: #16a34a; background: #f0fdf4; }

        /* ========== Overlay ========== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,22,19,0.25);
            backdrop-filter: blur(2px);
            z-index: 10000;
        }
        .sidebar-overlay.active { display: block; }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            :root { --sidebar-width: 88vw; }

            .message-content { max-width: 86%; font-size: 0.9rem; }
            .quick-actions { flex-direction: column; }
            .quick-btn { width: 100%; }
            .message-actions { opacity: 1; }

            .chat-container { padding: 1rem 0.7rem 0; }
            .input-area { padding: 0.8rem 0 1rem; }

            .header { padding: 0 1rem; }
            .site-title img { height: 42px; }
        }

        @media (max-width: 480px) {
            .message-content { max-width: 92%; }
            .welcome-message { padding: 1.4rem 1rem; }
        }
    </style>
</head>
<body>


    <!-- ========== السلايدبار (المحفوظات + المستخدم) ========== -->
    <div class="sidebar" id="historySidebar">
        <div class="sidebar-header">
            <h3>المحفوظات</h3>
            <div id="userSection" style="display:none;"></div>
            <button class="close-sidebar" id="closeSidebar">×</button>
        </div>

        <!-- شريط البحث -->
        <div style="padding: 0.8rem; border-bottom: 1px solid var(--border-subtle);">
            <input 
                type="text" 
                id="searchHistory" 
                placeholder="ابحث في المحفوظات..." 
                style="width: 100%; padding: 0.6rem; background: var(--bg-chat); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 0.85rem;"
            >
        </div>

        <div class="sidebar-content" id="historyList">
            <!-- تملأ بواسطة JavaScript -->
            <div class="history-empty">لا توجد محفوظات بعد</div>
        </div>
        <div class="sidebar-footer">
            <button class="clear-history-btn" id="clearHistoryBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> مسح الكل
            </button>
        </div>
    </div>

    <!-- الرأس -->
    <header class="header">
        <div class="header-inner">
            <!-- اللوغو في اليسار -->
            <div class="site-title">
                <img src="https://private-us-east-1.manuscdn.com/user_upload_by_module/session_file/310519663406446349/wdjbvmzYyfONYqmA.png?Expires=1804261184&Signature=dR-gEtp5gPBlEkkK4amxdhy0vsdQmcPkwGh3EqXZasQ77dvYnSjyx3IBrfvjmV0QjMjf0-7m5w4mHe4Fhb6-VbEoW8lQ-QTysTk1Wap65MTb4~V8T5k1uCY1LOVv6uhnnlM9nvsjPMwmbevM3vwz5eSaOprEj4OE18xsDisX4Y-kfsZRn5-1IK3rryGGLNQyn-iTDxby7RswezuIjx0IQX1GWTfXRHk9x9MRkFVBK4i2dfRjG9mz1MLVIrabWI3M-vCKd4y1VfH9Ih9frQVc4mVDyIgh642WorxrH2ebuX9dmPMB1EjQY6HKG5Cc~VfdmHv5eugQv4XlI6vYVCX~VA__&Key-Pair-Id=K2HSFNDJXOU9YS" alt="اسأل الإسلام" class="header-logo" style="filter: brightness(0) saturate(100%);">
            </div>

            <!-- زر السلايدبار في اليمين -->
            <button class="sidebar-toggle" id="sidebarToggle">

    <!-- ========== سكريبت رئيسي (تعامل مع الرسائل والتفاعلات) ========== -->
    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesArea = document.getElementById('messagesArea');
        const typingIndicator = document.getElementById('typingIndicator');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('historySidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const closeSidebar = document.getElementById('closeSidebar');

        const WORKER_URL = '/api/chat';
        let chatHistory = [];
        let isProcessing = false;

        // تعديل حجم textarea تلقائياً
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // إرسال بالضغط على Enter
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // زر الإرسال
        sendBtn.addEventListener('click', sendMessage);

        // فتح/إغلاق الـ Sidebar
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        });

        closeSidebar.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;

            addMessage(text, 'user');
            chatHistory.push({ role: 'user', content: text });

            messageInput.value = '';
            messageInput.style.height = 'auto';

            typingIndicator.classList.add('active');
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        chatHistory: chatHistory.slice(-4)
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();

                if (data.content) {
                    addMessage(data.content, 'assistant', data.sources, text);
                    chatHistory.push({ role: 'assistant', content: data.content });
                    if (window.saveConversation) {
                        window.saveConversation(text, data.content);
                    }
                } else {
                    addMessage('عذراً، لم أتمكن من العثور على إجابة.', 'assistant', null, text);
                }

            } catch (error) {
                console.error('❌ خطأ:', error);
                let errorMessage = "⚠️ حدث خطأ في الاتصال بالخادم. يرجى المحاولة مرة أخرى.";
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = "🔌 لا يمكن الاتصال بالخادم. تأكد من أن الـ Worker منشور.";
                }
                addMessage(errorMessage, 'assistant', null, text);
            } finally {
                typingIndicator.classList.remove('active');
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(content, role, sources = null, userQuestion = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatarContent = role === 'user' 
                ? '👤' 
                : '<img src="https://cdn.jsdelivr.net/gh/askislam-ai/assets@main/logo.png" alt="اسأل الإسلام">';

            const actionsHTML = role === 'assistant' ? `
                <div class="message-actions">
                    <button class="action-btn btn-copy" title="نسخ" onclick="copyMsg(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <button class="action-btn btn-like" title="إعجاب" onclick="likeMsg(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                    </button>
                    <button class="action-btn btn-dislike" title="عدم إعجاب" onclick="dislikeMsg(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2h-2.67"/></svg>
                    </button>
                    <button class="action-btn btn-regen" title="إعادة التوليد" onclick="regenMsg(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
                    </button>
                </div>
            ` : '';

            let messageHTML = `
                <div class="message-avatar">${role === 'assistant' ? `<img src="https://private-us-east-1.manuscdn.com/user_upload_by_module/session_file/310519663406446349/wdjbvmzYyfONYqmA.png?Expires=1804261184&Signature=dR-gEtp5gPBlEkkK4amxdhy0vsdQmcPkwGh3EqXZasQ77dvYnSjyx3IBrfvjmV0QjMjf0-7m5w4mHe4Fhb6-VbEoW8lQ-QTysTk1Wap65MTb4~V8T5k1uCY1LOVv6uhnnlM9nvsjPMwmbevM3vwz5eSaOprEj4OE18xsDisX4Y-kfsZRn5-1IK3rryGGLNQyn-iTDxby7RswezuIjx0IQX1GWTfXRHk9x9MRkFVBK4i2dfRjG9mz1MLVIrabWI3M-vCKd4y1VfH9Ih9frQVc4mVDyIgh642WorxrH2ebuX9dmPMB1EjQY6HKG5Cc~VfdmHv5eugQv4XlI6vYVCX~VA__&Key-Pair-Id=K2HSFNDJXOU9YS" alt="اسأل الإسلام" style="filter: brightness(0) saturate(100%);" />` : avatarContent}</div>
                <div class="message-content">
                    ${formatContent(content)}
                    ${sources ? formatSources(sources) : ''}
                    ${actionsHTML}
                </div>
            `;
            messageDiv.innerHTML = messageHTML;
            if (userQuestion) messageDiv.dataset.uq = userQuestion;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function copyMsg(btn) {
            const lines = btn.closest('.message-content').cloneNode(true);
            lines.querySelector('.message-actions')?.remove();
            const text = lines.innerText.trim();
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 2000);
            });
        }

        function likeMsg(btn) {
            btn.classList.toggle('active-like');
            btn.closest('.message-actions').querySelector('.btn-dislike').classList.remove('active-dislike');
        }

        function dislikeMsg(btn) {
            btn.classList.toggle('active-dislike');
            btn.closest('.message-actions').querySelector('.btn-like').classList.remove('active-like');
        }

        async function regenMsg(btn) {
            const msgDiv = btn.closest('.message.assistant');
            const question = msgDiv?.dataset?.uq;
            if (!question || isProcessing) return;
            msgDiv.remove();
            isProcessing = true;
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            messagesArea.scrollTop = messagesArea.scrollHeight;
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: question, chatHistory: chatHistory.slice(-4) })
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                addMessage(data.content || 'عذراً، لم أتمكن من العثور على إجابة.', 'assistant', data.sources, question);
                if (data.content) chatHistory.push({ role: 'assistant', content: data.content });
            } catch {
                addMessage('⚠️ حدث خطأ في الاتصال.', 'assistant', null, question);
            } finally {
                typingIndicator.classList.remove('active');
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }

        function formatContent(text) {
            if (!text) return '';
            text = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // إصلاح regex مع u flag لدعم Unicode بشكل صحيح
            text = text.replace(/﴿(.*?)﴾/gsu, '<span style="font-family: \'Amiri Quran\'; font-size: 1.2em; color: #cc785c;">﴿$1﴾</span>');
            text = text.replace(/«(.*?)»/gs, '<span style="color: #6b6560; font-style: italic;">«$1»</span>');
            text = text.replace(/(النبي محمد|رسول الله|النبي ﷺ)/g, '$1 ﷺ');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function formatSources(sources) {
            if (!sources) return '';
            let sourcesText = [];
            if (sources.quran > 0) sourcesText.push(`📖 ${sources.quran} آية`);
            if (sources.hadith > 0) sourcesText.push(`📿 ${sources.hadith} حديث`);
            if (sources.islamweb > 0) sourcesText.push(`📚 ${sources.islamweb} فتوى`);
            if (sourcesText.length === 0) return '';
            return `
                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--accent);">
                    ${sourcesText.join(' • ')}
                </div>
            `;
        }

        function askQuestion(question) {
            document.getElementById('messageInput').value = question;
            document.getElementById('messageInput').focus();
            sendMessage();
        }
        window.askQuestion = askQuestion;
    </script>

    <!-- ========== 🔥 Firebase Authentication + حفظ المحادثات لكل مستخدم ========== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf1ImP5YtSHf9ZnGd71n-QoX0Ao_WcJk0",
            authDomain: "askislam-e9803.firebaseapp.com",
            projectId: "askislam-e9803",
            storageBucket: "askislam-e9803.firebasestorage.app",
            messagingSenderId: "707749928558",
            appId: "1:707749928558:web:d47d6968baca2c7436907f",
            measurementId: "G-WT3XWTMCJH"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        getRedirectResult(auth)
            .then((result) => {
                if (result && result.user) {
                    console.log("✅ تم تسجيل الدخول بنجاح:", result.user.displayName);
                }
            })
            .catch((error) => {
                console.error("❌ خطأ في معالجة نتيجة التوجيه:", error.code, error.message);
            });

        window.currentUser = null;

        window.loginGoogle = async () => {
            try {
                await signInWithRedirect(auth, provider);
            } catch (error) {
                console.error("خطأ في تسجيل الدخول:", error);
                alert("فشل تسجيل الدخول. حاول مرة أخرى.");
            }
        };

        window.logout = async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("خطأ في تسجيل الخروج:", error);
            }
        };

        function updateUserUI(user) {
            const userSection = document.getElementById('userSection');
            if (!userSection) return;
            if (user) {
                const photoURL = user.photoURL || 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg';
                const displayName = user.displayName || 'مستخدم';
                const shortName = displayName.length > 10 ? displayName.substring(0, 10) + '...' : displayName;
                userSection.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <img src="${photoURL}" alt="${displayName}"
                             style="width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover;"
                             onerror="this.src='https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg'">
                        <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-primary); white-space: nowrap;">${shortName}</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">خروج</button>
                `;
            } else {
                userSection.innerHTML = '';
            }
        }

        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            updateUserUI(user);
            if (window.loadHistory) window.loadHistory();
        });

        setTimeout(() => {
            if (!window.currentUser) updateUserUI(null);
        }, 500);

        function getHistoryKey() {
            const uid = window.currentUser ? window.currentUser.uid : 'guest';
            return `askislam_history_${uid}`;
        }

        window.saveConversation = function(question, answer) {
            const key = getHistoryKey();
            let history = JSON.parse(localStorage.getItem(key) || '[]');
            const tags = [];
            if (question.includes('قرآن') || answer.includes('﴿')) tags.push('قرآن');
            if (question.includes('حديث') || answer.includes('روى')) tags.push('حديث');
            if (question.includes('فقه') || question.includes('حكم')) tags.push('فقه');
            if (question.includes('دعاء') || question.includes('أدعية')) tags.push('دعاء');
            if (question.includes('صلاة')) tags.push('عبادة');
            if (question.includes('زكاة') || question.includes('صيام') || question.includes('حج')) tags.push('أركان');
            const entry = {
                question: question.substring(0, 100) + (question.length > 100 ? '...' : ''),
                answer: answer.replace(/<[^>]*>/g, '').substring(0, 120) + (answer.length > 120 ? '...' : ''),
                timestamp: new Date().toISOString(),
                fullQuestion: question,
                fullAnswer: answer,
                tags: tags,
                id: Date.now() + Math.random()
            };
            history.unshift(entry);
            if (history.length > 100) history.pop();
            localStorage.setItem(key, JSON.stringify(history));
            if (window.renderHistorySidebar) window.renderHistorySidebar();
        };

        window.loadHistory = function() {
            const key = getHistoryKey();
            const stored = localStorage.getItem(key);
            try {
                window.conversationHistory = stored ? JSON.parse(stored) : [];
            } catch(e) {
                window.conversationHistory = [];
            }
            if (window.renderHistorySidebar) window.renderHistorySidebar();
        };

        window.clearHistory = function() {
            if (confirm('هل أنت متأكد من حذف جميع المحفوظات؟')) {
                const key = getHistoryKey();
                localStorage.removeItem(key);
                window.conversationHistory = [];
                if (window.renderHistorySidebar) window.renderHistorySidebar();
            }
        };

        window.renderHistorySidebar = function() {
            const historyList = document.getElementById('historyList');
            if (!historyList) return;
            if (!window.conversationHistory || window.conversationHistory.length === 0) {
                historyList.innerHTML = '<div class="history-empty">لا توجد محفوظات بعد</div>';
                return;
            }
            let html = '';
            window.conversationHistory.forEach((item, index) => {
                html += `
                    <div class="history-item" data-index="${index}">
                        <div class="history-item-content">
                            <div class="history-question">❓ ${item.question}</div>
                            <div class="history-answer">${item.answer}</div>
                        </div>
                        <button class="history-delete-btn" data-delete-index="${index}" title="حذف">🗑️</button>
                    </div>
                `;
            });
            historyList.innerHTML = html;

            document.querySelectorAll('.history-item-content').forEach(el => {
                el.addEventListener('click', function() {
                    const index = this.parentElement.dataset.index;
                    const item = window.conversationHistory[index];
                    if (item) {
                        document.getElementById('messageInput').value = item.fullQuestion || item.question;
                        document.getElementById('messageInput').focus();
                    }
                });
            });

            document.querySelectorAll('.history-delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const index = parseInt(this.dataset.deleteIndex);
                    if (confirm('هل تريد حذف هذه المحادثة؟')) {
                        const key = getHistoryKey();
                        let history = JSON.parse(localStorage.getItem(key) || '[]');
                        history.splice(index, 1);
                        localStorage.setItem(key, JSON.stringify(history));
                        window.conversationHistory = history;
                        window.renderHistorySidebar();
                    }
                });
            });
        };

        window.loadHistory();

        document.getElementById('clearHistoryBtn').addEventListener('click', () => window.clearHistory());

        document.getElementById('searchHistory').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            const historyItems = document.querySelectorAll('.history-item');
            if (!searchTerm) {
                historyItems.forEach(item => item.style.display = 'block');
                return;
            }
            historyItems.forEach(item => {
                const question = item.querySelector('.history-question')?.textContent.toLowerCase() || '';
                const answer = item.querySelector('.history-answer')?.textContent.toLowerCase() || '';
                item.style.display = (question.includes(searchTerm) || answer.includes(searchTerm)) ? 'block' : 'none';
            });
        });

        console.log('✅ Firebase جاهز');
    </script>
</body>
