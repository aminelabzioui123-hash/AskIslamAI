<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>اسأل الإسلام AI - بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Amiri+Quran&display=swap" rel="stylesheet">
    <style>
        /* ========== Reset ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        :root {
            --bg-primary: #F7F3E8;
            --bg-secondary: #EDE8D8;
            --bg-sidebar: #F9F5EA;
            --bg-card: #F9F5EA;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --accent: #000000;
            --accent-hover: #333333;
            --border: rgba(0, 0, 0, 0.18);
            --border-strong: rgba(0, 0, 0, 0.30);
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.10);
            --shadow-md: 0 4px 14px rgba(0,0,0,0.14);
            --shadow-lg: 0 8px 28px rgba(0,0,0,0.18);
            --sidebar-width: 300px;
            --header-height: 0px;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            overflow-x: hidden;
        }

        /* ========== Sidebar ========== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            z-index: 10001;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.8rem 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0rem;
            flex-shrink: 0;
        }

        .sidebar-logo {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .sidebar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
            display: block;
        }

        .sidebar-title {
            display: none;
        }

        .sidebar-user {
            padding: 0 1.2rem;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .new-chat-btn {
            margin: 0 1.2rem 1rem;
            width: calc(100% - 2.4rem);
            padding: 0.8rem 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-sm);
        }

        .new-chat-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Conversations Section */
        .conversations-section {
            padding: 0 1.2rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .conversation-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 0.8rem 0.8rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background: var(--bg-secondary);
            border-color: var(--border);
        }

        .conversation-item.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 500;
            border-color: var(--accent);
        }

        /* Spaces Section */
        .spaces-section {
            padding: 1rem 1.2rem;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .spaces-section::-webkit-scrollbar { width: 4px; }
        .spaces-section::-webkit-scrollbar-track { background: transparent; }
        .spaces-section::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

        .space-item {
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .space-item:hover {
            background: var(--bg-secondary);
        }

        .space-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .space-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .space-count {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            flex-shrink: 0;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 1rem 1.2rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .footer-btn {
            padding: 0.7rem 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-family: inherit;
        }

        .footer-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--border-strong);
        }

        .footer-btn svg {
            width: 16px;
            height: 16px;
        }

        .logout-btn {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .delete-all-btn {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .delete-all-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            border-color: #ef4444;
        }

        /* Confirm dialog */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.active { display: flex; }

        .confirm-box {
            background: var(--bg-card);
            border: 1.5px solid #1a1a1a;
            border-radius: var(--radius);
            box-shadow: 5px 7px 0px rgba(0,0,0,0.18);
            padding: 1.8rem 1.6rem;
            max-width: 320px;
            width: 90%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .confirm-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .confirm-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .confirm-btns {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            margin-top: 0.3rem;
        }

        .confirm-yes {
            padding: 0.6rem 1.4rem;
            background: #ef4444;
            color: white;
            border: 1.5px solid #dc2626;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .confirm-yes:hover { background: #dc2626; }

        .confirm-no {
            padding: 0.6rem 1.4rem;
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid #1a1a1a;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 3px 0px rgba(0,0,0,0.15);
        }
        .confirm-no:hover { background: var(--bg-secondary); }

        /* ========== Header with Hamburger Menu ========== */
        .header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1rem;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            min-height: 68px;
        }

        .hamburger-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .hamburger-btn:hover {
            background: var(--bg-secondary);
        }

        .hamburger-btn svg {
            width: 24px;
            height: 24px;
        }

        .header-logo-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
        }

        .header-logo-img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .header-logo-text {
            display: none;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ========== Main Chat Area ========== */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            margin-right: var(--sidebar-width);
            min-width: 0;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
            min-height: 0;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 0;
            overscroll-behavior: contain;
        }

        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

        /* ========== Welcome Message ========== */
        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2.5rem 1rem;
            text-align: center;
        }

        .welcome-logo {
            display: none;
        }

        .welcome-basmala {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 1.6rem;
            color: var(--text-primary);
            text-align: center;
            line-height: 2;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .welcome-features {
            display: none;
        }

        .feature-badge {
            display: none;
        }

        /* ========== Messages ========== */
        .message {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            font-weight: 600;
            background: var(--accent);
            color: white;
        }

        .message.assistant .message-avatar {
            background: var(--bg-card);
            border: 1.5px solid #1a1a1a;
            color: var(--text-primary);
            overflow: hidden;
            padding: 3px;
        }

        .message.assistant .message-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .message-content {
            background: var(--bg-card);
            border: 1.5px solid #1a1a1a;
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
            max-width: 70%;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 3px 5px 0px rgba(0,0,0,0.18);
            color: var(--text-primary);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            border-color: #000;
            box-shadow: 3px 5px 0px rgba(0,0,0,0.18);
        }

        /* ========== Typing Indicator ========== */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.9rem;
            padding: 0.85rem 1.3rem;
            background: #1a1a1a;
            border: 1.5px solid #1a1a1a;
            border-radius: var(--radius);
            width: fit-content;
            box-shadow: 3px 4px 0px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        .typing-indicator.active { display: flex; }

        .typing-dots {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-7px); opacity: 1; }
        }

        .typing-text {
            font-size: 0.88rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.01em;
        }

        /* ========== Input Area ========== */
        .input-area {
            padding: 1rem 2rem;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            width: 100%;
        }

        .input-area .input-wrapper {
            max-width: 868px;
            margin: 0 auto;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1.5px solid #1a1a1a;
            border-radius: var(--radius);
            padding: 0.6rem 0.8rem;
            transition: all 0.2s;
            box-shadow: 2px 3px 0px rgba(0,0,0,0.22);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .options-toggle {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .options-toggle:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .options-toggle svg {
            width: 20px;
            height: 20px;
        }

        .options-menu {
            position: absolute;
            bottom: 100%;
            left: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.8rem;
            min-width: 200px;
            z-index: 1000;
            animation: slideUp 0.2s ease-out;
        }

        .options-menu.active {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-item {
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .option-item:hover {
            background: var(--bg-primary);
            border-color: var(--border-strong);
        }

        .option-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .option-item.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 80px;
            line-height: 1.4;
            min-height: 36px;
            padding: 0.2rem 0;
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: var(--shadow-md);
        }

        .send-btn:active:not(:disabled) { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-tools {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
            min-height: 0;
        }

        .input-tools.hidden {
            display: none;
        }

        .input-tools:empty {
            display: none;
        }

        .tool-btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .tool-btn:hover {
            background: var(--bg-primary);
            border-color: var(--border-strong);
            color: var(--text-primary);
        }

        .tool-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ========== Message Actions ========== */
        .message-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.6rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions { opacity: 1; }

        .action-btn {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-tertiary);
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .action-btn.btn-copy { color: #3b82f6; }
        .action-btn.btn-copy:hover { border-color: #3b82f6; background: #eff6ff; }
        .action-btn.btn-copy.copied { color: #16a34a; border-color: #16a34a; background: #f0fdf4; }
        
        .action-btn.btn-like { color: var(--text-tertiary); }
        .action-btn.btn-like:hover { border-color: #16a34a; color: #16a34a; }
        .action-btn.btn-like.active-like { color: #16a34a; border-color: #16a34a; background: #f0fdf4; }
        
        .action-btn.btn-dislike { color: var(--text-tertiary); }
        .action-btn.btn-dislike:hover { border-color: #ef4444; color: #ef4444; }
        .action-btn.btn-dislike.active-dislike { color: #ef4444; border-color: #ef4444; background: #fef2f2; }
        
        .action-btn.btn-regen { color: var(--text-tertiary); }
        .action-btn.btn-regen:hover { border-color: #8b5cf6; color: #8b5cf6; }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            :root { --sidebar-width: 250px; }
            .message-content { max-width: 80%; }
            .chat-container { padding: 1rem 0.8rem 0; }
        }

        @media (max-width: 768px) {
            :root { --sidebar-width: 0; }
            .header { display: flex; }
            .sidebar { position: fixed; top: 0; right: -100%; width: 290px; height: 100vh; transition: right 0.3s ease; z-index: 10001; }
            .sidebar.active { right: 0; }
            .main-container { margin-right: 0; height: 100vh; }
            .sidebar-logo { width: 90px; height: 90px; }
            .chat-container { padding: 0.6rem 0.5rem 0; }
            .messages-area { padding: 0.8rem 0; gap: 1rem; }
            .message-content { max-width: 85%; font-size: 0.9rem; padding: 0.8rem 1rem; }
            .input-area { padding: 0.6rem 0.5rem; position: relative; bottom: auto; left: auto; right: auto; width: 100%; background: var(--bg-primary); border-top: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
            .input-wrapper { padding: 0.5rem; gap: 0.5rem; }
            .input-row { gap: 0.4rem; }
            .send-btn { width: 34px; height: 34px; }
            .send-btn svg { width: 16px; height: 16px; }
            .message-input { font-size: 0.9rem; max-height: 80px; }
            .input-tools { gap: 0.3rem; }
            .tool-btn { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
            .welcome-section { padding: 1rem 0.8rem; }
            .welcome-title { font-size: 1.4rem; }
            .welcome-subtitle { font-size: 0.9rem; }
            .welcome-features { gap: 0.5rem; }
            .feature-badge { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .messages-area { gap: 1rem; padding: 0.8rem 0; }
            .message { gap: 0.6rem; }
            .message-avatar { width: 32px; height: 32px; font-size: 0.8rem; }
            .message-content { max-width: 90%; }
            .message-actions { gap: 0.3rem; }
            .action-btn { width: 24px; height: 24px; }
            .typing-indicator { padding: 0.8rem 1rem; }
        }

        @media (max-width: 480px) {
            :root { --sidebar-width: 0; }
            .header { display: flex; }
            .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; transition: right 0.3s ease; z-index: 10001; }
            .sidebar.active { right: 0; }
            .sidebar-logo { width: 90px; height: 90px; }
            .welcome-logo { width: 50px; height: 50px; }
            .welcome-title { font-size: 1.2rem; margin-bottom: 0.2rem; }
            .welcome-subtitle { font-size: 0.8rem; margin-bottom: 0.8rem; }
            .welcome-section { padding: 1rem 0.8rem; gap: 1rem; }
            .message-content { max-width: 92%; font-size: 0.85rem; padding: 0.6rem 0.8rem; }
            .message-avatar { width: 32px; height: 32px; }
            .input-area { padding: 0.5rem 0.4rem; position: relative; bottom: auto; left: auto; right: auto; width: 100%; background: var(--bg-primary); border-top: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
            .input-wrapper { padding: 0.4rem; gap: 0.4rem; }
            .input-row { gap: 0.3rem; }
            .send-btn { width: 32px; height: 32px; }
            .send-btn svg { width: 14px; height: 14px; }
            .message-input { font-size: 0.8rem; max-height: 60px; min-height: 32px; }
            .options-toggle { width: 32px; height: 32px; }
            .options-toggle svg { width: 18px; height: 18px; }
            .tool-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
            .message-avatar { width: 28px; height: 28px; }
            .feature-badge { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
            .chat-container { padding: 0.6rem 0.5rem 0; }
            .messages-area { gap: 0.8rem; padding: 0.6rem 0; }
            .typing-indicator { padding: 0.6rem 0.8rem; font-size: 0.8rem; }
            .typing-text { font-size: 0.8rem; }
        }

        @media (max-height: 600px) {
            .welcome-section { padding: 0.5rem 0.8rem; }
            .welcome-logo { width: 50px; height: 50px; }
            .welcome-title { font-size: 1.2rem; margin-bottom: 0.2rem; }
            .welcome-subtitle { font-size: 0.8rem; margin-bottom: 0.8rem; }
            .welcome-features { gap: 0.3rem; }
            .feature-badge { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
            .input-area { padding: 0.4rem 0.3rem; }
            .input-wrapper { padding: 0.3rem; gap: 0.3rem; }
            .message-input { max-height: 50px; min-height: 28px; font-size: 0.75rem; }
        }
    </style>
</head>

    <!-- ========== Main Script ========== -->
    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesArea = document.getElementById('messagesArea');
        const typingIndicator = document.getElementById('typingIndicator');
        const newChatBtn = document.getElementById('newChatBtn');
        const conversationList = document.getElementById('conversationList');
        const userSection = document.getElementById('userSection');
        const logoutBtn = document.getElementById('logoutBtn');
        const inputTools = document.getElementById('inputTools');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            if (!sidebar) return;
            sidebar.classList.toggle('active');
            if (sidebarOverlay) {
                sidebarOverlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
            }
        }

        if (hamburgerBtn) hamburgerBtn.addEventListener('click', toggleSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', toggleSidebar);

        const WORKER_URL = '/api/chat';
        let chatHistory = [];
        let isProcessing = false;
        let currentChatId = null;
        let allChats = [];
        let selectedOptions = new Set();

        // تعديل حجم textarea تلقائياً
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // إرسال بالضغط على Enter
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // زر الإرسال
        sendBtn.addEventListener('click', sendMessage);

        // محادثة جديدة
        newChatBtn.addEventListener('click', startNewChat);

        // التحكم في قائمة الخيارات
                // إغلاق القائمة عند الضغط في أي مكان
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.options-toggle') && !e.target.closest('.options-menu')) {
            }
        });

        // اختيار الخيارات
        deepSearchOption.addEventListener('click', function() {
            this.classList.toggle('active');
            selectedOptions.toggle('deep-search');
            updateToolsDisplay();
        });

        deepThinkOption.addEventListener('click', function() {
            this.classList.toggle('active');
            selectedOptions.toggle('deep-think');
            updateToolsDisplay();
        });

        // تحديث عرض الأدوات المختارة
        function updateToolsDisplay() {
            inputTools.innerHTML = '';
            if (selectedOptions.size === 0) {
                inputTools.innerHTML = '<span style="font-size: 0.8rem; color: var(--text-secondary);">اختر خيارات متقدمة من القائمة</span>';
            } else {
                if (selectedOptions.has('deep-search')) {
                    const btn = document.createElement('button');
                    btn.className = 'tool-btn active';
                    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg> البحث المتقدم';
                    inputTools.appendChild(btn);
                }
                if (selectedOptions.has('deep-think')) {
                    const btn = document.createElement('button');
                    btn.className = 'tool-btn active';

        // إضافة دالة toggle للـ Set
        Set.prototype.toggle = function(value) {
            if (this.has(value)) {
                this.delete(value);
            } else {
                this.add(value);
            }
        };

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            if (!currentChatId) {
                startNewChat();
            }

            isProcessing = true;
            sendBtn.disabled = true;

            addMessage(text, 'user');
            chatHistory.push({ role: 'user', content: text });

            messageInput.value = '';
            messageInput.style.height = 'auto';

            typingIndicator.classList.add('active');
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        chatHistory: chatHistory.slice(-4),
                        options: Array.from(selectedOptions)
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();

                if (data.content) {
                    addMessage(data.content, 'assistant', data.sources, text);
                    chatHistory.push({ role: 'assistant', content: data.content });
                    saveChat();
                } else {
                    addMessage('عذراً، لم أتمكن من العثور على إجابة.', 'assistant', null, text);
                }

            } catch (error) {
                console.error('❌ خطأ:', error);
                let errorMessage = "⚠️ حدث خطأ في الاتصال بالخادم. يرجى المحاولة مرة أخرى.";
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = "🔌 لا يمكن الاتصال بالخادم. تأكد من أن الـ Worker منشور.";
                }
                addMessage(errorMessage, 'assistant', null, text);
            } finally {
                typingIndicator.classList.remove('active');
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

                    <button class="action-btn btn-copy" title="نسخ" onclick="copyMsg(this)">

                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h-2m0 0H8m4 0v4m0-4v-2m0 0h2m-2 0H8m4 0v4m0-4v-2"/></svg>

            let messageHTML = `
                <div class="message-avatar">${avatarContent}</div>
                <div class="message-content">
                    ${formatContent(content)}

        function copyMsg(btn) {
            const lines = btn.closest('.message-content').cloneNode(true);
            lines.querySelector('.message-actions')?.remove();
            const text = lines.innerText.trim();
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                setTimeout(() => { btn.classList.remove('copied'); }, 2000);
            });
        }

        function likeMsg(btn) {
            btn.classList.toggle('active-like');
            btn.closest('.message-actions').querySelector('.btn-dislike').classList.remove('active-dislike');
        }

        function dislikeMsg(btn) {
            btn.classList.toggle('active-dislike');
            btn.closest('.message-actions').querySelector('.btn-like').classList.remove('active-like');
        }

        async function regenMsg(btn) {
            const msgDiv = btn.closest('.message.assistant');
            const question = msgDiv?.dataset?.uq;
            if (!question || isProcessing) return;
            msgDiv.remove();
            isProcessing = true;
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            messagesArea.scrollTop = messagesArea.scrollHeight;
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: question, 
                        chatHistory: chatHistory.slice(-4),
                        options: Array.from(selectedOptions)
                    })
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                addMessage(data.content || 'عذراً، لم أتمكن من العثور على إجابة.', 'assistant', data.sources, question);
                if (data.content) chatHistory.push({ role: 'assistant', content: data.content });
                saveChat();
            } catch {
                addMessage('⚠️ حدث خطأ في الاتصال.', 'assistant', null, question);
            } finally {
                typingIndicator.classList.remove('active');
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }

        function formatContent(text) {
            if (!text) return '';
            text = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            text = text.replace(/﴿(.*?)﴾/gsu, '<span style="font-family: \'Amiri Quran\'; font-size: 1.1em; color: #000;">﴿$1﴾</span>');
            text = text.replace(/«(.*?)»/gs, '<span style="color: #666; font-style: italic;">«$1»</span>');
            text = text.replace(/(النبي محمد|رسول الله|النبي ﷺ)/g, '$1 ﷺ');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function formatSources(sources) {
            if (!sources) return '';
            let sourcesText = [];
            if (sources.quran > 0) sourcesText.push(`📖 ${sources.quran} آية`);
            if (sources.islamweb > 0) sourcesText.push(`📚 ${sources.islamweb} فتوى`);
            if (sourcesText.length === 0) return '';
            return `
                <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-secondary);">
                    ${sourcesText.join(' • ')}
                </div>
            `;
        }

        function startNewChat() {
            currentChatId = Date.now() + Math.random();
            chatHistory = [];
            selectedOptions.clear();
            updateToolsDisplay();
            messagesArea.innerHTML = `
                <div class="welcome-section">
                    <div class="welcome-basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                    <div>
                        <div class="welcome-title">كيف يمكنني مساعدتك؟</div>
                        <div class="welcome-subtitle">اسأل عن أي موضوع إسلامي من القرآن والسنة و نجيبك من المصادر المعتمدة في الاسلام</div>
                    </div>
                </div>
            `;
            messageInput.focus();
        }

        function saveChat() {
            const chatKey = `chat_${window.currentUser?.uid || 'guest'}_${currentChatId}`;
            const firstMessage = chatHistory.find(m => m.role === 'user')?.content || 'محادثة جديدة';
            const chatData = {
                id: currentChatId,
                title: firstMessage.substring(0, 50),
                history: chatHistory,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(chatKey, JSON.stringify(chatData));
            loadChats();
        }

        function loadChats() {
            const userId = window.currentUser?.uid || 'guest';
            const prefix = `chat_${userId}_`;
            allChats = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith(prefix)) {
                    const data = JSON.parse(localStorage.getItem(key));
                    allChats.push(data);
                }
            }
            allChats.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            renderConversations();
        }

        function renderConversations() {
            if (allChats.length === 0) {
                conversationList.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-tertiary); font-size: 0.85rem;">لا توجد محادثات</div>';
                return;
            }
            conversationList.innerHTML = allChats.map((chat, idx) => `
                <div class="conversation-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat(${chat.id})">
                    ${chat.title}
                </div>
            `).join('');
        }

        function loadChat(chatId) {
            const userId = window.currentUser?.uid || 'guest';
            const chatKey = `chat_${userId}_${chatId}`;
            const data = JSON.parse(localStorage.getItem(chatKey));
            if (data) {
                currentChatId = chatId;
                chatHistory = data.history;
                selectedOptions.clear();
                updateToolsDisplay();
                    messagesArea.innerHTML = '';
                chatHistory.forEach(msg => {
                    addMessage(msg.content, msg.role);
                });
                renderConversations();
            }
        }

        window.askQuestion = function(question) {
            messageInput.value = question;
            messageInput.focus();
            sendMessage();
        };

        // ── Delete all chats ──────────────────────────────────────────────
        const deleteAllBtn = document.getElementById('deleteAllBtn');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');

        deleteAllBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('active');
        });

        confirmNo.addEventListener('click', () => {
            confirmOverlay.classList.remove('active');
        });

        confirmOverlay.addEventListener('click', (e) => {
            if (e.target === confirmOverlay) confirmOverlay.classList.remove('active');
        });

        confirmYes.addEventListener('click', () => {
            const userId = window.currentUser?.uid || 'guest';
            const prefix = `chat_${userId}_`;
            const keysToDelete = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(prefix)) keysToDelete.push(key);
            }
            keysToDelete.forEach(k => localStorage.removeItem(k));
            allChats = [];
            renderConversations();
            confirmOverlay.classList.remove('active');
            startNewChat();
        });
    </script>

    <!-- ========== Confirm Delete Dialog ========== -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-title">🗑️ حذف جميع المحادثات</div>
            <div class="confirm-sub">هل أنت متأكد؟ سيتم حذف جميع المحادثات المحفوظة نهائياً.</div>
            <div class="confirm-btns">
                <button class="confirm-yes" id="confirmYes">نعم، احذف</button>
                <button class="confirm-no" id="confirmNo">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- ========== Firebase Authentication ========== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf1ImP5YtSHf9ZnGd71n-QoX0Ao_WcJk0",
            authDomain: "askislam-e9803.firebaseapp.com",
            projectId: "askislam-e9803",
            storageBucket: "askislam-e9803.firebasestorage.app",
            messagingSenderId: "707749928558",
            appId: "1:707749928558:web:d47d6968baca2c7436907f",
            measurementId: "G-WT3XWTMCJH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        getRedirectResult(auth)
            .then((result) => {
                if (result && result.user) {
                    console.log("✅ تم تسجيل الدخول بنجاح:", result.user.displayName);
                }
            })
            .catch((error) => {
                console.error("❌ خطأ في معالجة نتيجة التوجيه:", error.code, error.message);
            });

        window.currentUser = null;

        window.loginGoogle = async () => {
            try {
                await signInWithRedirect(auth, provider);
            } catch (error) {
                console.error("خطأ في تسجيل الدخول:", error);
                alert("فشل تسجيل الدخول. حاول مرة أخرى.");
            }
        };

        window.logout = async () => {
            try {
                await signOut(auth);
                location.reload();
            } catch (error) {
                console.error("خطأ في تسجيل الخروج:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            const userSection = document.getElementById('userSection');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (user) {
                userSection.style.display = 'block';
                logoutBtn.style.display = 'flex';
                document.getElementById('userName').textContent = user.displayName || 'مستخدم';
                document.getElementById('userEmail').textContent = user.email || user.uid;
                
                const avatar = document.getElementById('userAvatar');
                if (user.photoURL) {
                    avatar.innerHTML = `<img src="${user.photoURL}" alt="${user.displayName}">`;
                } else {
                    avatar.textContent = user.displayName?.charAt(0) || '👤';
                }
            } else {
                userSection.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
            
            loadChats();
        });

        document.getElementById('logoutBtn').addEventListener('click', window.logout);
        document.getElementById('settingsBtn').addEventListener('click', () => {
            if (!window.currentUser) {
                window.loginGoogle();
            }
        });

        console.log('✅ Firebase جاهز');
    </script>
