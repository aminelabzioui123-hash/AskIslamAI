<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسأل الإسلام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f9fa;
  --bg3: #eff3f4;
  --txt: #0f1419;
  --txt2: #536471;
  --txt3: #8899a6;
  --border: #eff3f4;
  --accent: #1d9bf0;
  --accent2: #1a8cd8;
  --like: #f91880;
  --rt: #00ba7c;
  --shadow: rgba(0,0,0,0.08);
  --logo-filter: none;
}
html.dark {
  --bg: #000;
  --bg2: #16181c;
  --bg3: #202327;
  --txt: #e7e9ea;
  --txt2: #71767b;
  --txt3: #536471;
  --border: #2f3336;
  --shadow: rgba(255,255,255,0.04);
  --logo-filter: invert(1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;}

/* LAYOUT */
.app{display:grid;grid-template-columns:260px 1fr 340px;height:100vh;}
@media(max-width:1100px){.app{grid-template-columns:60px 1fr;}.rside{display:none;}.nav-label{display:none;}.nav-item{justify-content:center;}.compose-btn span{display:none;}.compose-btn{width:44px;height:44px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;}}
@media(max-width:640px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.mobile-nav{display:flex;}}

/* SIDEBAR */
.sidebar{border-left:1px solid var(--border);padding:0.5rem 0.75rem;display:flex;flex-direction:column;gap:0.25rem;overflow-y:auto;position:sticky;top:0;height:100vh;}
.logo{display:flex;align-items:center;gap:0.6rem;padding:0.75rem 0.75rem 1.25rem;font-weight:700;font-size:1.1rem;cursor:pointer;color:var(--txt);text-decoration:none;}
.logo svg{flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:0.9rem;padding:0.7rem 0.75rem;border-radius:30px;cursor:pointer;font-size:1rem;font-weight:500;border:none;background:transparent;color:var(--txt);font-family:inherit;transition:background 0.15s;}
.nav-item:hover{background:var(--bg3);}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:22px;height:22px;flex-shrink:0;}
.compose-btn{margin:0.5rem 0;padding:0.85rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;width:100%;}
.compose-btn:hover{background:var(--accent2);}
.user-card{margin-top:auto;display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:12px;cursor:pointer;border:none;background:transparent;color:var(--txt);font-family:inherit;transition:background 0.15s;width:100%;}
.user-card:hover{background:var(--bg3);}

/* AVATAR */
.ava{border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:0.85rem;overflow:hidden;}
.ava img{width:100%;height:100%;object-fit:cover;}
.ava-sm{width:36px;height:36px;}
.ava-md{width:44px;height:44px;font-size:1rem;}
.ava-lg{width:56px;height:56px;font-size:1.2rem;}
.ava-xl{width:80px;height:80px;font-size:1.8rem;border:3px solid var(--bg);}

/* FEED */
.feed{border-right:1px solid var(--border);border-left:1px solid var(--border);height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.feed::-webkit-scrollbar{width:6px;}
.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.feed-top{position:sticky;top:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0.85rem 1rem;z-index:50;display:flex;align-items:center;gap:0.75rem;}
html.dark .feed-top{background:rgba(0,0,0,0.85);}
.feed-top h2{font-size:1.1rem;font-weight:700;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:var(--txt);padding:0.35rem;border-radius:50%;display:flex;transition:background 0.15s;}
.back-btn:hover{background:var(--bg3);}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

/* COMPOSER */
.composer{border-bottom:1px solid var(--border);padding:0.75rem 1rem;display:flex;gap:0.75rem;}
.composer-right{flex:1;display:flex;flex-direction:column;}
.composer textarea{background:transparent;border:none;color:var(--txt);font-size:1.1rem;font-family:inherit;resize:none;outline:none;min-height:60px;width:100%;padding-top:0.5rem;}
.composer textarea::placeholder{color:var(--txt2);}
.composer-footer{display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid var(--border);margin-top:0.5rem;}
.composer-tools{display:flex;gap:0.25rem;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.icon-btn:hover{background:rgba(29,155,240,0.1);}
.icon-btn svg{width:18px;height:18px;}
.post-btn{padding:0.5rem 1.25rem;background:var(--accent);color:#fff;border:none;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.9rem;font-family:inherit;transition:background 0.15s;}
.post-btn:hover{background:var(--accent2);}
.post-btn:disabled{opacity:0.4;cursor:not-allowed;}
.char-count{font-size:0.8rem;color:var(--txt2);}
.char-count.warn{color:#ffa500;}
.char-count.over{color:var(--like);}

/* TWEET */
.tweet{border-bottom:1px solid var(--border);padding:0.85rem 1rem;cursor:pointer;transition:background 0.15s;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.tweet:hover{background:var(--bg2);}
.tweet-inner{display:flex;gap:0.75rem;}
.tweet-body{flex:1;min-width:0;}
.tweet-head{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.3rem;}
.tweet-name{font-weight:700;font-size:0.95rem;cursor:pointer;}
.tweet-name:hover{text-decoration:underline;}
.tweet-handle{color:var(--txt2);font-size:0.88rem;}
.tweet-time{color:var(--txt2);font-size:0.88rem;}
.tweet-text{font-size:0.97rem;line-height:1.55;word-break:break-word;margin-bottom:0.75rem;white-space:pre-wrap;}
.tweet-text a{color:var(--accent);text-decoration:none;}
.tweet-text a:hover{text-decoration:underline;}
.tweet-img{width:100%;border-radius:12px;max-height:280px;object-fit:cover;margin-bottom:0.75rem;display:block;}
.tweet-actions{display:flex;gap:0;margin-top:0.25rem;}
.tact{display:flex;align-items:center;gap:0.35rem;padding:0.4rem 0.6rem;border-radius:20px;cursor:pointer;transition:all 0.15s;color:var(--txt2);font-size:0.82rem;border:none;background:transparent;font-family:inherit;flex:1;justify-content:center;}
.tact svg{width:17px;height:17px;}
.tact:hover{background:rgba(29,155,240,0.1);color:var(--accent);}
.tact.like:hover{background:rgba(249,24,128,0.1);color:var(--like);}
.tact.like.on{color:var(--like);}
.tact.like.on svg{fill:var(--like);stroke:var(--like);}
.tact.rt:hover{background:rgba(0,186,124,0.1);color:var(--rt);}
.tact.rt.on{color:var(--rt);}
.tact.bm.on{color:var(--accent);}
.tact.bm.on svg{fill:var(--accent);}
.tact.del:hover{background:rgba(249,24,128,0.1);color:var(--like);}
.tweet-replies{padding-right:1rem;border-right:2px solid var(--border);}

/* RIGHT SIDEBAR */
.rside{padding:0.75rem 1rem;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;}
.rside::-webkit-scrollbar{width:6px;}
.rside::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.search-wrap{background:var(--bg3);border-radius:25px;display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1rem;border:1px solid transparent;transition:all 0.15s;}
.search-wrap:focus-within{background:var(--bg);border-color:var(--accent);}
.search-wrap input{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:0.9rem;outline:none;width:100%;}
.search-wrap input::placeholder{color:var(--txt2);}
.card{background:var(--bg2);border-radius:16px;overflow:hidden;}
.card-title{font-weight:700;font-size:1rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);}
.trend{padding:0.7rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.trend:last-child{border-bottom:none;}
.trend:hover{background:var(--bg3);}
.trend-cat{font-size:0.75rem;color:var(--txt2);}
.trend-tag{font-weight:700;font-size:0.95rem;}
.trend-num{font-size:0.78rem;color:var(--txt2);margin-top:0.1rem;}
.suggest{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;border-bottom:1px solid var(--border);transition:background 0.15s;}
.suggest:last-child{border-bottom:none;}
.suggest:hover{background:var(--bg3);}
.suggest-info{flex:1;min-width:0;}
.suggest-name{font-weight:700;font-size:0.88rem;}
.suggest-handle{color:var(--txt2);font-size:0.8rem;}
.follow-btn{padding:0.35rem 0.9rem;border:1px solid var(--txt);border-radius:20px;background:transparent;color:var(--txt);font-weight:700;font-size:0.8rem;cursor:pointer;font-family:inherit;transition:all 0.15s;flex-shrink:0;}
.follow-btn:hover{background:var(--txt);color:var(--bg);}
.follow-btn.following{background:transparent;border-color:var(--txt2);color:var(--txt2);}
.theme-btn{padding:0.6rem 1rem;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--txt);font-family:inherit;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;transition:all 0.15s;}
.theme-btn:hover{background:var(--bg3);}
.logout-btn{padding:0.6rem 1rem;border:1px solid var(--like);border-radius:20px;background:transparent;color:var(--like);font-family:inherit;font-size:0.85rem;cursor:pointer;font-weight:600;transition:all 0.15s;}
.logout-btn:hover{background:var(--like);color:#fff;}

/* PROFILE */
.cover{height:160px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);position:relative;overflow:hidden;}
.cover-btn{position:absolute;bottom:0.6rem;left:0.6rem;padding:0.35rem 0.8rem;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:15px;cursor:pointer;font-family:inherit;font-size:0.8rem;}
.profile-meta{padding:0.75rem 1rem 0;}
.ava-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;}
.ava-xl{margin-top:-44px;position:relative;}
.ava-cam{position:absolute;bottom:0;left:0;width:28px;height:28px;background:var(--accent);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ava-cam svg{width:13px;height:13px;color:#fff;}
.edit-btn{padding:0.4rem 1rem;border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:20px;cursor:pointer;font-weight:700;font-size:0.85rem;font-family:inherit;transition:all 0.15s;}
.edit-btn:hover{background:rgba(29,155,240,0.1);}
.pname{font-weight:700;font-size:1.15rem;}
.phandle{color:var(--txt2);font-size:0.9rem;margin-bottom:0.4rem;}
.pbio{font-size:0.9rem;color:var(--txt);line-height:1.5;margin-bottom:0.6rem;}
.pstats{display:flex;gap:1.5rem;}
.pstat span{font-weight:700;}
.pstat small{color:var(--txt2);font-size:0.85rem;}
.ptabs{display:flex;border-bottom:1px solid var(--border);margin-top:0.75rem;}
.ptab{flex:1;padding:0.75rem;text-align:center;cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--txt2);border-bottom:2px solid transparent;transition:all 0.15s;}
.ptab.active{color:var(--accent);border-color:var(--accent);}
.ptab:hover{background:var(--bg3);}
.empty-state{padding:2.5rem 1rem;text-align:center;color:var(--txt2);}
.empty-state svg{width:42px;height:42px;margin-bottom:0.75rem;opacity:0.4;}
.empty-state p{font-size:0.9rem;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:16px;padding:1.5rem;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.modal-head h3{font-size:1.1rem;font-weight:700;}
.close-btn{background:none;border:none;cursor:pointer;color:var(--txt);padding:0.3rem;border-radius:50%;display:flex;transition:background 0.15s;}
.close-btn:hover{background:var(--bg3);}
.close-btn svg{width:20px;height:20px;}
.form-g{margin-bottom:1rem;}
.form-g label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:0.35rem;color:var(--txt2);}
.form-g input,.form-g textarea{width:100%;padding:0.65rem 0.85rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;color:var(--txt);background:var(--bg2);font-size:0.95rem;transition:border 0.15s;}
.form-g input:focus,.form-g textarea:focus{outline:none;border-color:var(--accent);background:var(--bg);}
.form-g textarea{resize:vertical;min-height:80px;}
.form-submit{width:100%;padding:0.7rem;background:var(--accent);color:#fff;border:none;border-radius:20px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.95rem;transition:background 0.15s;}
.form-submit:hover{background:var(--accent2);}
.err{color:var(--like);font-size:0.82rem;margin-top:0.3rem;}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.auth-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;}
.auth-logo{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:1.5rem;color:var(--txt);}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.auth-tab{flex:1;padding:0.65rem;text-align:center;cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--txt2);border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.auth-tab.active{color:var(--accent);border-color:var(--accent);}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;}
.toast{background:#333;color:#fff;padding:0.65rem 1.25rem;border-radius:20px;font-size:0.88rem;font-weight:500;animation:toastIn 0.25s ease;white-space:nowrap;}
html.dark .toast{background:#e7e9ea;color:#000;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.toast.out{animation:toastOut 0.3s ease forwards;}
@keyframes toastOut{to{opacity:0;transform:translateY(10px);}}

/* MOBILE NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);z-index:100;padding:0.5rem;}
.mobile-nav-inner{display:flex;justify-content:space-around;}
.mnav-btn{background:none;border:none;cursor:pointer;color:var(--txt2);padding:0.5rem;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:0.15rem;font-size:0.65rem;font-family:inherit;transition:color 0.15s;}
.mnav-btn svg{width:22px;height:22px;}
.mnav-btn.active{color:var(--accent);}

/* REPLY THREAD */
.reply-line{width:2px;background:var(--border);margin:0.3rem auto;flex:1;min-height:20px;}
.tweet-thread{display:flex;flex-direction:column;align-items:center;width:44px;}

/* BADGE */
.badge{background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:0.65rem;display:inline-flex;align-items:center;justify-content:center;font-weight:700;margin-right:auto;}

input[type=file]{display:none;}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">اسأل الإسلام</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">دخول</button>
      <button class="auth-tab" onclick="authTab('signup')">حساب جديد</button>
    </div>
    <div id="loginForm">
      <div class="form-g"><label>البريد الإلكتروني</label><input id="li-email" type="email" placeholder="example@mail.com"></div>
      <div class="form-g"><label>كلمة المرور</label><input id="li-pass" type="password" placeholder="••••••"></div>
      <div class="err" id="li-err"></div>
      <button class="form-submit" style="margin-top:0.75rem" onclick="doLogin()">دخول</button>
      <div style="margin-top:0.75rem;font-size:0.82rem;color:var(--txt2);text-align:center;">حساب تجريبي: test@test.com / 123456</div>
    </div>
    <div id="signupForm" style="display:none">
      <div class="form-g"><label>الاسم الكامل</label><input id="su-name" type="text" placeholder="أحمد محمد"></div>
      <div class="form-g"><label>اسم المستخدم</label><input id="su-handle" type="text" placeholder="ahmed_m"></div>
      <div class="form-g"><label>البريد الإلكتروني</label><input id="su-email" type="email" placeholder="example@mail.com"></div>
      <div class="form-g"><label>كلمة المرور</label><input id="su-pass" type="password" placeholder="••••••"></div>
      <div class="err" id="su-err"></div>
      <button class="form-submit" style="margin-top:0.75rem" onclick="doSignup()">إنشاء الحساب</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appPage" style="display:none">

            <input type="file" id="modalImgUpload" accept="image/*" onchange="handleImgUpload(this,'modal')">

          <div style="display:flex;align-items:center;gap:0.75rem">

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ============================================================
// STATE
// ============================================================
const MAX_CHARS = 280;
let me = null;
let db = { users:{}, tweets:[], notifications:[] };
let pendingImg = { composer:null, modal:null };
let currentPage = 'home';
let pageHistory = [];
let viewingUserId = null;

// ============================================================
// INIT
// ============================================================
window.onload = () => {
  loadDB();
  loadTheme();
  const saved = localStorage.getItem('session');
  if(saved && db.users[saved]){
    me = db.users[saved];
    showApp();
  } else {
    document.getElementById('authPage').style.display='flex';
  }
};

function loadDB(){
  const raw = localStorage.getItem('isdb');
  if(raw) db = JSON.parse(raw);
  // seed demo user + tweets
  if(!db.users['test@test.com']){
    const uid = 'u_demo';
    db.users['test@test.com'] = {id:uid,email:'test@test.com',pass:hash('123456'),name:'أحمد محمد',handle:'ahmed_m',bio:'مهتم بالعلوم الإسلامية 📖',avatar:null,color:'#1d9bf0',followers:[],following:[],bookmarks:[]};
    const uid2 = 'u_fatima';
    db.users['fatima@test.com'] = {id:uid2,email:'fatima@test.com',pass:hash('123456'),name:'فاطمة علي',handle:'fatima_ali',bio:'طالبة علم شرعي',avatar:null,color:'#e91e8c',followers:[],following:[],bookmarks:[]};
    db.tweets = [
      {id:'t1',uid:uid2,text:'بسم الله الرحمن الرحيم\nأسأل الله أن يرزقنا العلم النافع والعمل الصالح 🤲',ts:Date.now()-3600000*2,likes:[],retweets:[],replies:['t3'],img:null},
      {id:'t2',uid:uid,text:'السلام عليكم! ما حكم قراءة القرآن من الهاتف بدون وضوء؟\n#فقه_إسلامي #القرآن',ts:Date.now()-3600000,likes:[uid2],retweets:[],replies:[],img:null},
      {id:'t3',uid:uid,text:'جزاك الله خيراً أختي فاطمة 🌹',ts:Date.now()-3600000*1.5,likes:[],retweets:[],replies:[],replyTo:'t1',img:null},
    ];
    if(!db.notifications) db.notifications = [];
    saveDB();
  }
  if(!db.notifications) db.notifications = [];
}

function saveDB(){localStorage.setItem('isdb',JSON.stringify(db));}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h.toString(36);}

// ============================================================
// AUTH
// ============================================================
function authTab(t){
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes(t)));
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('signupForm').style.display = t==='signup'?'block':'none';
}

function doLogin(){
  const email=v('li-email').trim().toLowerCase();
  const pass=v('li-pass');
  const u = db.users[email];
  if(!u || u.pass!==hash(pass)){
    document.getElementById('li-err').textContent='البريد أو كلمة المرور غير صحيحة';return;
  }
  me=u; localStorage.setItem('session',email); showApp();
}

function doSignup(){
  const name=v('su-name').trim();
  const handle=v('su-handle').trim().replace(/\s+/g,'_').toLowerCase();
  const email=v('su-email').trim().toLowerCase();
  const pass=v('su-pass');
  const err=document.getElementById('su-err');
  if(!name||!handle||!email||!pass){err.textContent='يرجى ملء جميع الحقول';return;}
  if(db.users[email]){err.textContent='هذا البريد مسجل مسبقاً';return;}
  const handles = Object.values(db.users).map(u=>u.handle);
  if(handles.includes(handle)){err.textContent='اسم المستخدم محجوز';return;}
  const colors=['#1d9bf0','#e91e8c','#00ba7c','#ff6b35','#7c3aed'];
  const uid='u_'+Date.now();
  db.users[email]={id:uid,email,pass:hash(pass),name,handle,bio:'',avatar:null,color:colors[Math.floor(Math.random()*colors.length)],followers:[],following:[],bookmarks:[]};
  me=db.users[email]; saveDB(); localStorage.setItem('session',email); showApp();
}

function doLogout(){
  me=null; localStorage.removeItem('session');
  document.getElementById('appPage').style.display='none';
  document.getElementById('authPage').style.display='flex';
  sv('li-email',''); sv('li-pass','');
}

// ============================================================
// APP
// ============================================================
function showApp(){
  document.getElementById('authPage').style.display='none';
  document.getElementById('appPage').style.display='block';
  updateSidebar();
  nav('home');
  renderTrends();
  renderSuggestions();
  loadTheme();
}

function updateSidebar(){
  document.getElementById('sidebarAva').innerHTML=avaHtml(me,36);
  document.getElementById('sidebarName').textContent=me.name;
  document.getElementById('sidebarHandle').textContent='@'+me.handle;
  document.getElementById('composerAva').innerHTML=avaHtml(me,44);
  document.getElementById('modalAva').innerHTML=avaHtml(me,44);
  updateNotifBadge();
}

function avaHtml(u,size){
  if(!u) return '';
  if(u.avatar) return `<img src="${u.avatar}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%">`;
  const letter = u.name.charAt(0);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${u.color||'#667eea'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${Math.round(size*0.38)}px;flex-shrink:0">${letter}</div>`;
}

// ============================================================
// NAVIGATION
// ============================================================
function nav(page, userId=null){
  pageHistory.push(currentPage);
  currentPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  // sidebar active
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+page);
  if(nb) nb.classList.add('active');
  // mobile
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  const mnb=document.getElementById('mnav-'+page);
  if(mnb) mnb.classList.add('active');

  if(page==='home') renderFeed();
  if(page==='explore'){ renderExploreTrends(); document.getElementById('searchResults').innerHTML=''; }
  if(page==='notifications') renderNotifications();
  if(page==='bookmarks') renderBookmarks();
  if(page==='profile'){
    viewingUserId = userId;
    renderProfile(userId);
    document.getElementById('profileBackBtn').style.display = userId ? 'flex':'none';
  }
}

function goBack(){
  const prev = pageHistory.pop() || 'home';
  currentPage=prev;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+prev).classList.add('active');
}

function openTweet(id){
  pageHistory.push(currentPage);
  currentPage='tweet';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-tweet').classList.add('active');
  renderTweetDetail(id);
}

// ============================================================
// FEED RENDER
// ============================================================
function renderFeed(){
  const container=document.getElementById('tweetsContainer');
  const sorted=[...db.tweets].sort((a,b)=>b.ts-a.ts);
  const top = sorted.filter(t=>!t.replyTo);
  if(!top.length){
    container.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>لا توجد تغريدات بعد.<br>كن أول من يغرّد!</p></div>`;
    return;
  }
  container.innerHTML=top.map(t=>tweetCard(t,false,false)).join('');
}

function tweetCard(tweet, isDetail=false, isReply=false){
  const author = getUserById(tweet.uid);
  if(!author) return '';
  const liked = tweet.likes.includes(me.id);
  const retweeted = tweet.retweets.includes(me.id);
  const bookmarked = me.bookmarks && me.bookmarks.includes(tweet.id);
  const isMine = tweet.uid === me.id;
  const timeStr = relTime(tweet.ts);
  const textHtml = formatText(tweet.text);
  const replyCount = (tweet.replies||[]).length;

  return `<div class="tweet" id="tw-${tweet.id}" onclick="handleTweetClick(event,'${tweet.id}')">
    <div class="tweet-inner">
      <div onclick="event.stopPropagation();nav('profile','${author.id}')" style="cursor:pointer">${avaHtml(author,44)}</div>
      <div class="tweet-body">
        <div class="tweet-head">
          <span class="tweet-name" onclick="event.stopPropagation();nav('profile','${author.id}')">${esc(author.name)}</span>
          <span class="tweet-handle">@${esc(author.handle)}</span>
          <span class="tweet-time">· ${timeStr}</span>
        </div>
        ${tweet.replyTo?`<div style="font-size:0.82rem;color:var(--txt2);margin-bottom:0.3rem">رداً على @${esc(getUserById(getTweetById(tweet.replyTo)?.uid)?.handle||'')}</div>`:''}
        <div class="tweet-text">${textHtml}</div>
        ${tweet.img?`<img class="tweet-img" src="${tweet.img}" onclick="event.stopPropagation()" loading="lazy">`:''}
        <div class="tweet-actions" onclick="event.stopPropagation()">
          <button class="tact" onclick="openReply('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${replyCount||''}
          </button>
          <button class="tact rt ${retweeted?'on':''}" onclick="doRetweet('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            ${tweet.retweets.length||''}
          </button>
          <button class="tact like ${liked?'on':''}" onclick="doLike('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${tweet.likes.length||''}
          </button>
          <button class="tact bm ${bookmarked?'on':''}" onclick="doBookmark('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="${bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          ${isMine?`<button class="tact del" onclick="deleteTweet('${tweet.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function handleTweetClick(e,id){
  if(e.target.closest('button')||e.target.closest('a')) return;
  openTweet(id);
}

// ============================================================
// TWEET DETAIL
// ============================================================
function renderTweetDetail(id){
  const tweet = getTweetById(id);
  if(!tweet){document.getElementById('tweetDetailContent').innerHTML='<div class="empty-state"><p>التغريدة غير موجودة</p></div>';return;}
  let html = tweetCard(tweet, true, false);
  // reply composer
  html += `<div class="composer" style="border-top:1px solid var(--border)">
    <div class="ava ava-md">${avaHtml(me,44)}</div>
    <div class="composer-right">
      <textarea id="replyTxt" placeholder="أضف ردك..." oninput="updateReplyComposer(this)" rows="2" style="width:100%;background:transparent;border:none;color:var(--txt);font-size:1rem;font-family:inherit;resize:none;outline:none;min-height:50px;padding-top:0.35rem"></textarea>
      <div style="display:flex;justify-content:flex-end;padding-top:0.5rem;border-top:1px solid var(--border);margin-top:0.5rem">
        <button class="post-btn" id="replyPostBtn" disabled onclick="postReply('${id}')">رد</button>
      </div>
    </div>
  </div>`;
  // replies
  const replies = (tweet.replies||[]).map(rid=>getTweetById(rid)).filter(Boolean).sort((a,b)=>a.ts-b.ts);
  if(replies.length) html += `<div style="padding-top:0.5rem">`+replies.map(r=>tweetCard(r,false,true)).join('')+`</div>`;
  document.getElementById('tweetDetailContent').innerHTML=html;
}

// ============================================================
// TWEET ACTIONS
// ============================================================
function postTweet(){
  const text = v('composerTxt').trim();
  if(!text && !pendingImg.composer) return;
  createTweet(text, null, pendingImg.composer);
  sv('composerTxt','');
  pendingImg.composer=null;
  document.getElementById('composerImgPreview').innerHTML='';
  document.getElementById('postBtn').disabled=true;
  document.getElementById('charCount').textContent=MAX_CHARS;
  document.getElementById('charCount').className='char-count';
  renderFeed();
  toast('تم النشر بنجاح ✓');
}

function postFromModal(){
  const text = v('modalTxt').trim();
  const replyTo = v('replyToId');
  if(!text && !pendingImg.modal) return;
  const tw = createTweet(text, replyTo||null, pendingImg.modal);
  if(replyTo){
    const parent = getTweetById(replyTo);
    if(parent){
      if(!parent.replies) parent.replies=[];
      parent.replies.push(tw.id);
      // notification
      if(parent.uid !== me.id){
        addNotif(parent.uid,'reply',tw.id,me.id);
      }
    }
  }
  sv('modalTxt',''); sv('replyToId','');
  pendingImg.modal=null;
  document.getElementById('modalImgPreview').innerHTML='';
  document.getElementById('modalPostBtn').disabled=true;
  document.getElementById('modalCharCount').textContent=MAX_CHARS;
  closeModal('composeModal');
  saveDB();
  if(currentPage==='home') renderFeed();
  if(currentPage==='tweet') renderTweetDetail(replyTo||tw.id);
  toast(replyTo?'تم إرسال الرد ✓':'تم النشر ✓');
}

function createTweet(text, replyTo=null, img=null){
  const tw={id:'t'+Date.now(),uid:me.id,text,ts:Date.now(),likes:[],retweets:[],replies:[],replyTo,img};
  db.tweets.unshift(tw);
  saveDB();
  return tw;
}

function postReply(parentId){
  const text=v('replyTxt').trim();
  if(!text) return;
  const tw=createTweet(text,parentId,null);
  const parent=getTweetById(parentId);
  if(parent){
    if(!parent.replies) parent.replies=[];
    parent.replies.push(tw.id);
    if(parent.uid!==me.id) addNotif(parent.uid,'reply',tw.id,me.id);
    saveDB();
  }
  renderTweetDetail(parentId);
  toast('تم إرسال الرد ✓');
}

function doLike(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const idx=tw.likes.indexOf(me.id);
  if(idx>=0) tw.likes.splice(idx,1);
  else {
    tw.likes.push(me.id);
    if(tw.uid!==me.id) addNotif(tw.uid,'like',id,me.id);
  }
  saveDB();
  refreshTweetCard(id);
  updateNotifBadge();
}

function doRetweet(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const idx=tw.retweets.indexOf(me.id);
  if(idx>=0){tw.retweets.splice(idx,1);toast('تم إلغاء إعادة النشر');}
  else {
    tw.retweets.push(me.id);
    if(tw.uid!==me.id) addNotif(tw.uid,'retweet',id,me.id);
    toast('تمت إعادة النشر ✓');
  }
  saveDB();
  refreshTweetCard(id);
  updateNotifBadge();
}

function doBookmark(id){
  if(!me.bookmarks) me.bookmarks=[];
  const idx=me.bookmarks.indexOf(id);
  if(idx>=0){me.bookmarks.splice(idx,1);toast('تمت إزالته من المحفوظات');}
  else {me.bookmarks.push(id);toast('تمت إضافته للمحفوظات ✓');}
  db.users[me.email]=me; saveDB();
  refreshTweetCard(id);
}

function deleteTweet(id){
  if(!confirm('هل أنت متأكد من حذف هذه التغريدة؟')) return;
  const idx=db.tweets.findIndex(t=>t.id===id);
  if(idx>=0) db.tweets.splice(idx,1);
  // remove from parent replies
  db.tweets.forEach(t=>{if(t.replies) t.replies=t.replies.filter(r=>r!==id);});
  if(me.bookmarks) me.bookmarks=me.bookmarks.filter(b=>b!==id);
  db.users[me.email]=me; saveDB();
  const el=document.getElementById('tw-'+id);
  if(el) el.remove();
  toast('تم حذف التغريدة');
  if(currentPage==='tweet') goBack();
}

function refreshTweetCard(id){
  const tw=getTweetById(id);
  if(!tw) return;
  const el=document.getElementById('tw-'+id);
  if(!el) return;
  el.outerHTML=tweetCard(tw,false,false);
}

// ============================================================
// REPLY / COMPOSE MODAL
// ============================================================
function openCompose(){
  sv('replyToId','');
  document.getElementById('composeTitle').textContent='تغريدة جديدة';
  sv('modalTxt','');
  document.getElementById('modalPostBtn').disabled=true;
  document.getElementById('modalCharCount').textContent=MAX_CHARS;
  document.getElementById('modalImgPreview').innerHTML='';
  pendingImg.modal=null;
  openModal('composeModal');
}

function openReply(id){
  sv('replyToId',id);
  const tw=getTweetById(id);
  const auth=tw?getUserById(tw.uid):null;

function handleImgUpload(input, target){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{

    document.getElementById(previewId).innerHTML=
      `<div style="position:relative;display:inline-block">
        <img src="${e.target.result}" style="max-width:100%;border-radius:10px;max-height:200px;object-fit:cover">
        <button onclick="removeImg('${target}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;

      document.getElementById('postBtn').disabled=false;
    } else {
      document.getElementById('modalPostBtn').disabled=false;
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

function removeImg(target){
  pendingImg[target]=null;
  const previewId=target==='composer'?'composerImgPreview':'modalImgPreview';
  document.getElementById(previewId).innerHTML='';
  if(target==='composer'){
    const txt=document.getElementById('composerTxt');
    document.getElementById('postBtn').disabled=txt.value.trim().length===0;
  } else {
    const txt=document.getElementById('modalTxt');
    document.getElementById('modalPostBtn').disabled=txt.value.trim().length===0;
  }
}

  const userTweets=db.tweets.filter(t=>t.uid===user.id&&!t.replyTo).sort((a,b)=>b.ts-a.ts);
  const userReplies=db.tweets.filter(t=>t.uid===user.id&&t.replyTo).sort((a,b)=>b.ts-a.ts);
  document.getElementById('profileFeedTitle').textContent=user.name;

  let html=`<div class="cover">
    ${isMine?`<button class="cover-btn" onclick="toast('قريباً: رفع صورة الغلاف')">تغيير الغلاف</button>`:''}

      </div>
      ${isMine?`<button class="edit-btn" onclick="openEditProfile()">تعديل الملف</button>`:
        `<button class="edit-btn ${isFollowing?'':'follow-btn'}" onclick="toggleFollow('${user.id}')">${isFollowing?'متابَع ✓':'متابعة'}</button>`}
    </div>
    <div class="pname">${esc(user.name)}</div>
    <div class="phandle">@${esc(user.handle)}</div>
    ${user.bio?`<div class="pbio">${esc(user.bio)}</div>`:''}
    <div class="pstats">
      <div class="pstat"><span>${userTweets.length}</span> <small>تغريدة</small></div>
      <div class="pstat"><span>${(user.followers||[]).length}</span> <small>متابِع</small></div>

      <div class="ptab" id="ptab-replies" onclick="switchProfileTab('replies','${user.id}')">الردود</div>
      ${isMine?`<div class="ptab" id="ptab-likes" onclick="switchProfileTab('likes','${user.id}')">الإعجابات</div>`:''}

function switchProfileTab(tab, userId){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.getElementById('ptab-'+tab).classList.add('active');
  const user=getUserById(userId)||me;
  let tweets=[];
  if(tab==='tweets') tweets=db.tweets.filter(t=>t.uid===user.id&&!t.replyTo).sort((a,b)=>b.ts-a.ts);
  else if(tab==='replies') tweets=db.tweets.filter(t=>t.uid===user.id&&t.replyTo).sort((a,b)=>b.ts-a.ts);
  else if(tab==='likes') tweets=db.tweets.filter(t=>t.likes.includes(me.id)).sort((a,b)=>b.ts-a.ts);
  document.getElementById('profileTweets').innerHTML=
    tweets.length?tweets.map(t=>tweetCard(t,false,false)).join(''):`<div class="empty-state"><p>لا يوجد محتوى</p></div>`;
}

function openEditProfile(){
  sv('ed-name',me.name); sv('ed-handle',me.handle); sv('ed-bio',me.bio||'');
  document.getElementById('ed-err').textContent='';
  openModal('editModal');
}

function saveProfile(){
  const name=v('ed-name').trim();
  const handle=v('ed-handle').trim().replace(/\s+/g,'_').toLowerCase();
  const bio=v('ed-bio').trim();
  if(!name||!handle){document.getElementById('ed-err').textContent='الاسم واسم المستخدم مطلوبان';return;}
  const taken=Object.values(db.users).filter(u=>u.id!==me.id).map(u=>u.handle);
  if(taken.includes(handle)){document.getElementById('ed-err').textContent='اسم المستخدم محجوز';return;}
  me.name=name; me.handle=handle; me.bio=bio;
  db.users[me.email]=me; saveDB(); closeModal('editModal');
  updateSidebar(); renderProfile(); toast('تم حفظ التغييرات ✓');
}

function uploadAvatar(){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=e=>{
    const f=e.target.files[0];
    const r=new FileReader();
    r.onload=ev=>{me.avatar=ev.target.result;db.users[me.email]=me;saveDB();updateSidebar();renderProfile();toast('تم تحديث الصورة ✓');};
    r.readAsDataURL(f);
  };
  input.click();
}

// ============================================================
// FOLLOW
// ============================================================
function toggleFollow(userId){
  const target=getUserById(userId);
  if(!target) return;
  if(!me.following) me.following=[];
  if(!target.followers) target.followers=[];
  const idx=me.following.indexOf(userId);
  if(idx>=0){
    me.following.splice(idx,1);
    target.followers=target.followers.filter(f=>f!==me.id);
    toast('تم إلغاء المتابعة');
  } else {
    me.following.push(userId);
    target.followers.push(me.id);
    addNotif(userId,'follow',null,me.id);
    toast('تمت المتابعة ✓');
  }
  db.users[me.email]=me;
  // save target user
  const tEmail=Object.keys(db.users).find(k=>db.users[k].id===userId);
  if(tEmail) db.users[tEmail]=target;
  saveDB(); updateNotifBadge();
  renderProfile(userId);
  renderSuggestions();
}

function getTrends(){
  const tags={};
  db.tweets.forEach(t=>{
    const matches=t.text.match(/#[\u0600-\u06FFa-zA-Z0-9_]+/g)||[];
    matches.forEach(tag=>{tags[tag]=(tags[tag]||0)+1;});
  });
  return Object.entries(tags).sort((a,b)=>b[1]-a[1]).slice(0,5);
}

function renderTrends(){
  const trends=getTrends();
  const staticTrends=[['#القرآن_الكريم',245300],['#الفقه_الإسلامي',189200],['#السيرة_النبوية',156800],['#العقيدة',132500]];

  document.getElementById('trendsContent').innerHTML=all.map(([tag,num])=>
    `<div class="trend" onclick="searchByTag('${tag}')">

}

function renderSuggestions(){

function searchByTag(tag){
  nav('explore');
  const input=document.getElementById('exploreSearch');
  input.value=tag; doSearch(tag);
}

function doSearch(q){
  q=q.trim().toLowerCase();
  document.getElementById('exploreTrends').style.display=q?'none':'block';
  if(!q){document.getElementById('searchResults').innerHTML='';return;}
  // tweets
  const tweetMatches=db.tweets.filter(t=>t.text.toLowerCase().includes(q)).sort((a,b)=>b.ts-a.ts);
  // users
  const userMatches=Object.values(db.users).filter(u=>u.name.toLowerCase().includes(q)||u.handle.toLowerCase().includes(q)||('@'+u.handle).includes(q));
  let html='';
  if(userMatches.length){
    html+=`<div style="padding:0.75rem 1rem;font-weight:700;border-bottom:1px solid var(--border)">مستخدمون</div>`;
    html+=userMatches.map(u=>{
      const isFollowing=me.following&&me.following.includes(u.id);
      return `<div class="suggest" style="padding:0.85rem 1rem">
        <div onclick="nav('profile','${u.id}')" style="cursor:pointer">${avaHtml(u,40)}</div>
        <div class="suggest-info" onclick="nav('profile','${u.id}')" style="cursor:pointer">
          <div class="suggest-name">${esc(u.name)}</div>
          <div class="suggest-handle">@${esc(u.handle)}</div>
          ${u.bio?`<div style="font-size:0.82rem;color:var(--txt2);margin-top:0.15rem">${esc(u.bio.slice(0,60))}</div>`:''}
        </div>
        <button class="follow-btn ${isFollowing?'following':''}" onclick="toggleFollow('${u.id}')">${isFollowing?'متابَع':'متابعة'}</button>
      </div>`;
    }).join('');
  }
  if(tweetMatches.length){
    html+=`<div style="padding:0.75rem 1rem;font-weight:700;border-bottom:1px solid var(--border);border-top:1px solid var(--border)">تغريدات</div>`;
    html+=tweetMatches.map(t=>tweetCard(t,false,false)).join('');
  }
  if(!html) html=`<div class="empty-state"><p>لا توجد نتائج لـ "${esc(q)}"</p></div>`;
  document.getElementById('searchResults').innerHTML=html;
}

function sideSearch(q){
  if(!q.trim()) return;
  nav('explore');
  document.getElementById('exploreSearch').value=q;
  doSearch(q);
}

// ============================================================
// HELPERS
// ============================================================
function v(id){return document.getElementById(id).value;}
function sv(id,val){document.getElementById(id).value=val;}
function esc(s){if(!s) return '';const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function getTweetById(id){return db.tweets.find(t=>t.id===id);}
function getUserById(id){return Object.values(db.users).find(u=>u.id===id);}

function relTime(ts){
  const diff=(Date.now()-ts)/1000;
  if(diff<60) return 'الآن';
  if(diff<3600) return `${Math.floor(diff/60)}د`;
  if(diff<86400) return `${Math.floor(diff/3600)}س`;
  if(diff<604800) return `${Math.floor(diff/86400)}ي`;
  return new Date(ts).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
}

function fmtNum(n){if(n>=1000) return (n/1000).toFixed(1)+'K';return n;}

function formatText(text){
  if(!text) return '';
  let t=esc(text);
  // hashtags
  t=t.replace(/#([\u0600-\u06FFa-zA-Z0-9_]+)/g,'<a href="#" onclick="event.preventDefault();searchByTag(\'#$1\')">#$1</a>');
  // mentions
  t=t.replace(/@([a-zA-Z0-9_\u0600-\u06FF]+)/g,(m,h)=>{
    const u=Object.values(db.users).find(u=>u.handle===h);
    return u?`<a href="#" onclick="event.preventDefault();nav('profile','${u.id}')">@${h}</a>`:m;
  });
  // links
  t=t.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return t;
}

// keyboard shortcuts
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();nav('explore');document.getElementById('exploreSearch').focus();}
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(m=>m.classList.remove('open'));
  }
});
</script>
</body>
</html>
